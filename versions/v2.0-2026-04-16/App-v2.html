          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <div className="chip" style={{background:'var(--text)',color:'#fff',marginBottom:6}}>My Account</div>
              <h2 className="title">{user.name}</h2>
              <div style={{fontSize:13,color:'var(--text3)'}}>{user.email}</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-p" style={{fontSize:13}} onClick={()=>{onClose();onRetake();}}>New Assessment</button>
              <button className="btn btn-s" style={{fontSize:13}} onClick={onSignOut}>Sign Out</button>
              <button className="btn btn-s" style={{fontSize:13}} onClick={onClose} aria-label="Close dashboard">✕</button>
            </div>
          </div>

          <div style={{display:'flex',gap:4,background:'var(--bg)',borderRadius:12,padding:4}}>
            {[{k:'my',l:`My Results (${myResults.length})`},{k:'peer',l:`Peer Ratings (${peerResults.length})`},{k:'analytics',l:'Analytics'}].map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)}
                style={{flex:1,padding:'8px',borderRadius:9,border:'none',cursor:'pointer',
                  fontFamily:'var(--fb)',fontSize:13,fontWeight:600,transition:'all .15s',
                  background:tab===t.k?'var(--surface)':'transparent',
                  color:tab===t.k?'var(--text)':'var(--text3)',
                  boxShadow:tab===t.k?'0 1px 4px rgba(0,0,0,.08)':'none'}}>
                {t.l}
              </button>
            ))}
          </div>
        </div>

        {tab==='my'&&(
          myResults.length===0?(
            <div className="card-xl" style={{textAlign:'center',padding:'40px 20px'}}>
              <div style={{fontSize:48,marginBottom:12}}>📋</div>
              <h3 className="title" style={{marginBottom:8}}>No assessments yet</h3>
              <p className="small" style={{marginBottom:20}}>Complete the questionnaire to see your Personal Brand Archetype and scores here.</p>
              <button className="btn btn-p" onClick={()=>{onClose();onRetake();}}>Start Assessment →</button>
            </div>
          ):[...myResults].reverse().map((r,i)=>{
            const ar=ARCH[r.key];
            return(
              <div key={i} className="card-lg" style={{marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:8}}>
                  <div style={{fontSize:36}}>{ar?.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15,color:ar?.color}}>{ar?.name}</div>
                    <div style={{fontSize:12,color:'var(--text3)'}}>{new Date(r.savedAt).toLocaleDateString()} {r.date?`· ${r.date}`:''}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--fd)',fontSize:28,fontWeight:800,color:ar?.color,lineHeight:1}}>{Math.round(r.PBEw||0)}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>PBE</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  {[{l:'BA',v:r.BA,c:DC.BA},{l:'BD',v:r.BD,c:DC.BD},{l:'BR',v:r.BR,c:DC.BR}].map(d=>(
                    <div key={d.l} style={{flex:1,padding:'8px 10px',borderRadius:10,
                      background:d.c+'0C',border:`1px solid ${d.c}25`,textAlign:'center'}}>
                      <div style={{fontSize:10,fontWeight:700,color:d.c}}>{d.l}</div>
                      <div style={{fontWeight:800,fontSize:16,color:d.c,fontFamily:'var(--fd)'}}>{Math.round(d.v||0)}%</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })
        )}

        {tab==='peer'&&(
          peerResults.length===0?(
            <div className="card-xl fi" style={{textAlign:'center',padding:'48px 28px'}}>
              <div style={{fontSize:52,marginBottom:16}}>👥</div>
              <h3 className="title" style={{marginBottom:8}}>No peer ratings yet</h3>
              <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.7,marginBottom:24,maxWidth:420,margin:'0 auto 24px'}}>
                The dissertation finds sPBE and ePBE correlate at <strong>r=0.631</strong>.
                Gathering 3–5 peer ratings significantly increases measurement reliability — and often surfaces blind spots you can't see in self-assessment.
              </p>
              {(()=>{
                const peerUrl=`${window.location.href.split('?')[0]}?peer=1&for=${encodeURIComponent(user.name||user.email)}`;
                const [copied,setCopied]=useState(false);
                const copy=()=>{navigator.clipboard.writeText(peerUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});};
                return(
                  <div style={{maxWidth:420,margin:'0 auto'}}>
                    <div className="label" style={{marginBottom:8,textAlign:'left'}}>Your peer rating link</div>
                    <div style={{display:'flex',gap:8,marginBottom:16}}>
                      <input readOnly value={peerUrl} className="inp inp-sm"
                        style={{flex:1,color:'var(--text3)',fontSize:12}}
                        onClick={e=>e.target.select()}/>
                      <button className="btn btn-p" style={{padding:'8px 16px',fontSize:13,flexShrink:0}}
                        onClick={copy}>
                        {copied?'✓ Copied!':'Copy Link'}
                      </button>
                    </div>
                    <p style={{fontSize:12,color:'var(--text3)',lineHeight:1.6}}>
                      Send this link to 3–5 colleagues. Their results will appear here once submitted.
                      Peers must enter your exact name: <strong style={{color:'var(--text)'}}>{user.name||user.email}</strong>
                    </p>
                  </div>
                );
              })()}
            </div>
          ):(
            <>
            {latest&&avgPeer&&(
              <div className="card-lg" style={{marginBottom:16,background:'linear-gradient(135deg,var(--bg),var(--surface))'}}>
                <div className="subtitle" style={{marginBottom:4}}>Self vs. Peer Comparison</div>
                <div className="small" style={{marginBottom:14}}>Your self-assessment vs. average of {peerResults.length} peer rating{peerResults.length>1?'s':''} · dissertation finds r=0.631 correlation between sPBE and ePBE</div>
                {[{k:'BA',l:'Brand Appeal',c:DC.BA},{k:'BD',l:'Brand Differentiation',c:DC.BD},{k:'BR',l:'Brand Recognition',c:DC.BR}].map(d=>{
                  const self=Math.round(latest[d.k]||0);
                  const peer=Math.round(avgPeer[d.k]||0);
                  const diff=peer-self;
                  return(
                    <div key={d.k} style={{marginBottom:14}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontWeight:600,fontSize:13,color:d.c}}>{d.l}</span>
                        <span style={{fontSize:12,color:diff>0?'var(--success)':diff<0?'var(--error)':'var(--text3)',fontWeight:600}}>
                          Peers rate you {diff>0?`+${diff}`:diff<0?diff:' equally'} vs self
                        </span>
                      </div>
                      <div style={{position:'relative',marginBottom:4}}>
                        <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden',marginBottom:3}}>
                          <div style={{height:'100%',width:`${self}%`,background:d.c,opacity:0.4,borderRadius:4}}/>
                        </div>
                        <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${peer}%`,background:d.c,borderRadius:4}}/>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:16,fontSize:11,color:'var(--text3)'}}>
                        <span>Self: <strong style={{color:d.c,opacity:.7}}>{self}</strong></span>
                        <span>Peers avg: <strong style={{color:d.c}}>{peer}</strong></span>
                      </div>
                    </div>
                  );
                })}
                <div style={{marginTop:6,padding:'10px 14px',background:'var(--bg)',borderRadius:8,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
                  {avgPeer.PBEw>((latest.PBEw||0)+5)?'📈 Peers perceive your brand more positively than you rate yourself — your actual impact may exceed your self-perception.'
                  :avgPeer.PBEw<((latest.PBEw||0)-5)?'📉 You rate your brand higher than peers do — consider working on external visibility and impact.'
                  :'✅ Your self-perception aligns well with how peers perceive your brand — a healthy sign of self-awareness.'}
                </div>
              </div>
            )}
            {[...peerResults].reverse().map((r,i)=>{
              const ar=ARCH[r.key];
              return(
                <div key={i} className="card-lg" style={{marginBottom:12}}>
                  <div className="chip" style={{background:'var(--bg)',border:'1.5px solid var(--border)',
                    color:'var(--text2)',marginBottom:10}}>Peer rating by {r.raterName||'Anonymous'}</div>
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:8}}>
                    <div style={{fontSize:32}}>{ar?.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:ar?.color}}>{ar?.name}</div>
                      <div style={{fontSize:12,color:'var(--text3)'}}>{new Date(r.savedAt).toLocaleDateString()}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'var(--fd)',fontSize:24,fontWeight:800,color:ar?.color,lineHeight:1}}>{Math.round(r.PBEw||0)}</div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>PBE</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    {[{l:'BA',v:r.BA,c:DC.BA},{l:'BD',v:r.BD,c:DC.BD},{l:'BR',v:r.BR,c:DC.BR}].map(d=>(
                      <div key={d.l} style={{flex:1,padding:'8px 10px',borderRadius:10,
                        background:d.c+'0C',border:`1px solid ${d.c}25`,textAlign:'center'}}>
                        <div style={{fontSize:10,fontWeight:700,color:d.c}}>{d.l}</div>
                        <div style={{fontWeight:800,fontSize:16,color:d.c,fontFamily:'var(--fd)'}}>{Math.round(d.v||0)}%</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            </>
          )
        )}

        {tab==='analytics'&&(
          myResults.length===0?(
            <div className="card-xl" style={{textAlign:'center',padding:'40px 20px'}}>
              <div style={{fontSize:48,marginBottom:12}}>📊</div>
              <h3 className="title" style={{marginBottom:8}}>No data to analyze yet</h3>
              <p className="small" style={{marginBottom:20}}>Complete at least one assessment to see your analytics.</p>
              <button className="btn btn-p" onClick={()=>{onClose();onRetake();}}>Start Assessment →</button>
            </div>
          ):(
            <>
            {/* Progress over time */}
            {myResults.length>1&&(
              <div className="card-lg" style={{marginBottom:16}}>
                <div className="subtitle" style={{marginBottom:4}}>Progress Over Time ({myResults.length} assessments)</div>
                <div className="small" style={{marginBottom:14}}>How your three dimensions have changed across assessments</div>
                {[{k:'BA',l:'Brand Appeal',c:DC.BA},{k:'BD',l:'Brand Differentiation',c:DC.BD},{k:'BR',l:'Brand Recognition',c:DC.BR}].map(d=>{
                  const first=Math.round(myResults[0][d.k]||0);
                  const last=Math.round(myResults[myResults.length-1][d.k]||0);
                  const delta=last-first;
                  return(
                    <div key={d.k} style={{marginBottom:14}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontWeight:600,fontSize:13,color:d.c}}>{d.l}</span>
                        <span style={{fontSize:12,fontWeight:700,color:delta>0?'var(--success)':delta<0?'var(--error)':'var(--text3)'}}>
                          {delta>0?`+${delta} pts`:delta<0?`${delta} pts`:'no change'}
                        </span>
                      </div>
                      <div style={{display:'flex',gap:3}}>
                        {myResults.map((r,i)=>(
                          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
                            <div style={{height:40,width:'100%',background:'var(--border)',borderRadius:4,overflow:'hidden',display:'flex',alignItems:'flex-end'}}>
                              <div style={{width:'100%',height:`${r[d.k]||0}%`,background:d.c,opacity:0.7+0.3*(i/(myResults.length-1||1)),transition:'height .3s'}}/>
                            </div>
                            <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{Math.round(r[d.k]||0)}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Archetype journey */}
            <div className="card-lg" style={{marginBottom:16}}>
              <div className="subtitle" style={{marginBottom:4}}>Archetype Journey</div>
              <div className="small" style={{marginBottom:14}}>Your archetype classification across all assessments</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {myResults.map((r,i)=>{
                  const ar=ARCH[r.key];
                  return(
                    <div key={i} style={{padding:'10px 14px',borderRadius:10,
                      background:ar?.color+'10',border:`1.5px solid ${ar?.color||'#888'}30`,
                      textAlign:'center',minWidth:100}}>
                      <div style={{fontSize:22,marginBottom:3}}>{ar?.emoji}</div>
                      <div style={{fontSize:10,fontWeight:700,color:ar?.color,lineHeight:1.3,marginBottom:2}}>{ar?.name}</div>
                      <div style={{fontSize:9,color:'var(--text3)'}}>{new Date(r.savedAt).toLocaleDateString()}</div>
                      <div style={{fontSize:11,fontWeight:700,color:ar?.color,marginTop:3}}>PBE {Math.round(r.PBEw||0)}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Latest dimension detail */}
            {latest&&(
              <div className="card-lg" style={{marginBottom:16}}>
                <div className="subtitle" style={{marginBottom:4}}>Latest Assessment Detail</div>
                <div className="small" style={{marginBottom:14}}>{new Date(latest.savedAt).toLocaleDateString()} · {ARCH[latest.key]?.name}</div>
                {[{k:'BA',l:'Brand Appeal',c:DC.BA},{k:'BD',l:'Brand Differentiation',c:DC.BD},{k:'BR',l:'Brand Recognition',c:DC.BR},{k:'PBEw',l:'Overall PBE',c:'var(--pbe)'}].map(d=>(
                  <div key={d.k} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontWeight:600,fontSize:13,color:d.c}}>{d.l}</span>
                      <span style={{fontFamily:'var(--fd)',fontSize:18,fontWeight:800,color:d.c}}>{Math.round(latest[d.k]||0)}</span>
                    </div>
                    <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${latest[d.k]||0}%`,background:d.c,borderRadius:3}}/>
                    </div>
                  </div>
                ))}
                {avgPeer&&(
                  <div style={{marginTop:14,padding:'10px 14px',background:'var(--bg)',borderRadius:8,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
                    <strong>Peer consensus PBE: {Math.round(avgPeer.PBEw)}</strong> (avg across {peerResults.length} peer rating{peerResults.length>1?'s':''}). Gap from self: {Math.round((latest.PBEw||0)-avgPeer.PBEw)>0?'+':''}{Math.round((latest.PBEw||0)-avgPeer.PBEw)} pts.
                  </div>
                )}
              </div>
            )}

            {/* Invite peer section */}
            <div className="card-lg" style={{background:'linear-gradient(135deg,rgba(10,132,255,.05),transparent)'}}>
              <div className="subtitle" style={{marginBottom:4}}>Invite Peers to Rate You</div>
              <div className="small" style={{marginBottom:14}}>
                The dissertation shows sPBE and ePBE correlate at r=0.631. Gathering 3–5 peer ratings significantly increases measurement reliability. Share the link below with colleagues.
              </div>
              <div style={{padding:'10px 14px',background:'var(--bg)',borderRadius:8,
                fontFamily:'monospace',fontSize:11,color:'var(--text2)',wordBreak:'break-all',marginBottom:12}}>
                {`${window.location.href.split('?')[0]}?peer=1&for=${encodeURIComponent(user.name||user.email)}`}
              </div>
              <button className="btn btn-p" style={{fontSize:13}} onClick={()=>{
                const url=`${window.location.href.split('?')[0]}?peer=1&for=${encodeURIComponent(user.name||user.email)}`;
                navigator.clipboard?.writeText(url);
                alert('Peer rating link copied to clipboard!');
              }}>
                Copy Peer Rating Link
              </button>
            </div>
            </>
          )
        )}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  // screen: 'welcome'|'orgCreate'|'orgJoin'|'orgDash'|'profile'|'questions'|'calculating'|'results'
  const [screen,setScreen]=useState('welcome');
  const [answers,setAnswers]=useState(()=>{
    try{return JSON.parse(sessionStorage.getItem(SS_KEY)||'{}').answers||{};}catch{return {};}
  });
  const [scores,setScores]=useState(null);
  const [rawScores,setRawScores]=useState(null);
  const [profile,setProfile]=useState({
    name:'',title:'',industry:'',employment:'',seniority:'',
    linkedin:'',twitter:'',facebook:'',instagram:'',tiktok:'',youtube:'',
    researchgate:'',otherProfiles:[],
    linkedinConn:'',linkedinEndorse:'',linkedinRecs:'',
    twitterFollowers:'',fbFollowers:'',igFollowers:'',ytFollowers:'',ttFollowers:'',
    pubs:'',conferences:'',hindex:''
  });
  const [peerMode,setPeerMode]=useState(false);
  const [peerFor,setPeerFor]=useState('');
  const [currentUser,setCurrentUser]=useState(()=>{
    try{const s=localStorage.getItem('pbe_session');return s?JSON.parse(s):null;}catch{return null;}
  });
  const [showAuth,setShowAuth]=useState(false);
  const [authMode,setAuthMode]=useState('login');
  const [showDashboard,setShowDashboard]=useState(false);

  // Org mode state
  const [currentOrg,setCurrentOrg]=useState(null);
  const [currentOrgMember,setCurrentOrgMember]=useState(null);

  // Detect peer mode or login from URL
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get('peer')==='1'){
      const f=decodeURIComponent(p.get('for')||'');
      setPeerMode(true);setPeerFor(f);
      setProfile(prev=>({...prev,name:f}));
      setScreen('profile');
    }
    if(p.get('login')==='1') setShowAuth(true);
  },[]);

  const handleLogin=(user)=>{
    setCurrentUser(user);
    // Persist session (Supabase also manages its own session cookie)
    localStorage.setItem('pbe_session',JSON.stringify({
      email:user.email, name:user.name, id:user.id||null, supabase:user.supabase||false
    }));
    setShowAuth(false);
  };
  const handleSignOut=()=>{
    authSignOut(); // also clears Supabase session cookie
    setCurrentUser(null);localStorage.removeItem('pbe_session');setShowDashboard(false);
  };

  const handleStart=()=>setScreen('profile');
  const handlePeerStart=()=>{setPeerMode(true);setScreen('profile');};
  const handleProfileContinue=()=>setScreen('questions');
  const handleProfileSkip=()=>setScreen('questions');
  const handleAnswer=(id,v)=>setAnswers(p=>({...p,[id]:v}));

  const handleFinish=()=>{
    setScreen('calculating');
    window.scrollTo(0,0);
    setTimeout(()=>{
      const raw=calcScore(answers);
      const enriched=enrichScore(raw,profile);
      setRawScores(raw);setScores(enriched);
      setScreen('results');window.scrollTo(0,0);

      // Save to global results store (localStorage) + Supabase cloud
      try{
        const saved=JSON.parse(localStorage.getItem('pbe_results')||'[]');
        const entry={...enriched,name:profile.name||'Anonymous',title:profile.title||'',
          linkedin:profile.linkedin||'',date:new Date().toLocaleDateString(),
          industry:profile.industry||'',employment:profile.employment||'',seniority:profile.seniority||''};
        saved.push(entry);
        if(saved.length>500) saved.shift();
        localStorage.setItem('pbe_results',JSON.stringify(saved));

        // Cloud save (Supabase) — fire-and-forget, doesn't block UI
        if(currentUser?.id){
          supabase_saveAssessment({...entry,isPeer:peerMode,peerFor:peerFor||null,
            raterName:peerMode?(currentUser?.name||'Anonymous'):null}, currentUser.id);
        }

        if(currentUser) saveUserResult(currentUser.email,entry);
        if(peerMode&&peerFor){
          const users=getUsers();
          const targetUser=users.find(u=>u.name&&u.name.toLowerCase()===peerFor.toLowerCase());
          if(targetUser) savePeerResultForUser(targetUser.email,{...entry,raterName:currentUser?.name||'Anonymous',peerFor});
        }
        // Save result to org member record
        if(currentOrg&&currentOrgMember){
          saveOrgMember(currentOrg.id,{
            ...currentOrgMember,hasAssessment:true,
            BA:enriched.BA,BD:enriched.BD,BR:enriched.BR,
            PBEw:enriched.PBEw,archetypeKey:enriched.key,
            assessmentDate:new Date().toLocaleDateString()
          });
        }
      }catch(e){}
    },900);
  };

  const handleRestart=()=>{
    setAnswers({});setScores(null);setRawScores(null);
    setPeerMode(false);setPeerFor('');
    try{sessionStorage.removeItem(SS_KEY);}catch{}
    // If in org mode, go back to org dashboard
    if(currentOrg) setScreen('orgDash');
    else{setScreen('welcome');window.scrollTo(0,0);}
  };

  // Org mode handlers
  const handleOrgCreated=(org,member)=>{
    setCurrentOrg(org);setCurrentOrgMember(member);setScreen('orgDash');
  };
  const handleOrgJoined=(org,member)=>{
    setCurrentOrg(org);setCurrentOrgMember(member);setScreen('orgDash');
  };
  const handleOrgTakeAssessment=()=>{
    if(currentOrgMember) setProfile(p=>({...p,name:currentOrgMember.name,title:currentOrgMember.role||''}));
    setScreen('profile');
  };

  const isAdmin=new URLSearchParams(window.location.search).get('admin')==='1';
  if(isAdmin) return <AdminPanel/>;

  const UserBar=()=>(
    <div style={{position:'fixed',top:0,right:0,zIndex:50,padding:'10px 16px',
      display:'flex',gap:8,alignItems:'center'}}>
      {currentOrg&&screen!=='orgDash'&&(
        <button onClick={()=>setScreen('orgDash')}
          style={{padding:'6px 12px',background:'#8B5CF618',border:'1.5px solid #8B5CF640',
            borderRadius:20,cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'var(--fb)',
            color:'#8B5CF6',display:'flex',alignItems:'center',gap:5}}>
          🏢 {currentOrg.name}
        </button>
      )}
      {currentUser?(
        <button onClick={()=>setShowDashboard(true)}
          style={{display:'flex',alignItems:'center',gap:7,padding:'6px 12px',
            background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:20,
            cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--fb)',boxShadow:'var(--sh)'}}>
          <div style={{width:22,height:22,borderRadius:'50%',background:'var(--text)',
            color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,fontWeight:700,flexShrink:0}}>
            {(currentUser.name||'?')[0].toUpperCase()}
          </div>
          {currentUser.name}
        </button>
      ):(
        <button onClick={()=>setShowAuth(true)}
          style={{padding:'7px 16px',background:'var(--surface)',
            border:'1.5px solid var(--border)',borderRadius:20,cursor:'pointer',
            fontSize:13,fontWeight:600,fontFamily:'var(--fb)',boxShadow:'var(--sh)'}}>
          Sign In
        </button>
      )}
    </div>
  );

  return(
    <>
      <a href="#main-content" className="sr-only" style={{position:'absolute',top:4,left:4,zIndex:9999,
        padding:'8px 16px',background:'var(--text)',color:'#fff',borderRadius:6,fontWeight:600,
        fontSize:14,textDecoration:'none'}}
        onFocus={e=>e.target.style.clip='auto'}
        onBlur={e=>e.target.style.clip='rect(0,0,0,0)'}>
        Skip to main content
      </a>
      {screen!=='orgDash'&&<UserBar/>}
      {showAuth&&<UserAuthScreen onLogin={handleLogin} onClose={()=>setShowAuth(false)} initialMode={authMode}/>}
      {showDashboard&&currentUser&&(
        <UserDashboard user={currentUser} onSignOut={handleSignOut}
          onClose={()=>setShowDashboard(false)} onRetake={handleRestart}/>
      )}
      <main id="main-content">
        {screen==='welcome'&&(
          <WelcomeScreen onStart={handleStart} onPeerStart={handlePeerStart}
            onOrgCreate={()=>setScreen('orgCreate')} onOrgJoin={()=>setScreen('orgJoin')}
            peerFor={peerFor}/>
        )}
        {screen==='orgCreate'&&(
          <OrgCreateScreen onCreated={handleOrgCreated} onBack={()=>setScreen('welcome')}/>
        )}
        {screen==='orgJoin'&&(
          <OrgJoinScreen onJoined={handleOrgJoined} onBack={()=>setScreen('welcome')}/>
        )}
        {screen==='orgDash'&&currentOrg&&(
          <OrgDashboard org={currentOrg} currentMember={currentOrgMember}
            onTakeAssessment={handleOrgTakeAssessment}
            onClose={()=>{setCurrentOrg(null);setCurrentOrgMember(null);setScreen('welcome');}}/>

        {screen==='profile'&&(

            <div style={{fontFamily:'var(--fd)',fontSize:28,fontWeight:800,letterSpacing:'-.02em',
              color:'var(--text)',textAlign:'center',animation:'fadeUp .55s var(--ease) both'}}>
              Calculating your brand equity…
            </div>
            <div style={{display:'flex',gap:8,animation:'fadeIn .4s ease .3s both'}}>
              {['Brand Appeal','Brand Differentiation','Brand Recognition'].map((l,i)=>(
                <div key={l} style={{padding:'6px 14px',borderRadius:99,fontSize:12,fontWeight:600,
                  background:[DC.BA,DC.BD,DC.BR][i]+'18',color:[DC.BA,DC.BD,DC.BR][i],
                  animation:`pulse 1.2s ease ${i*0.25}s infinite`}}>{l}</div>
              ))}
            </div>
            <div style={{width:200,height:4,borderRadius:2,background:'var(--border)',overflow:'hidden',
              animation:'fadeIn .3s ease .5s both'}}>
              <div style={{height:'100%',borderRadius:2,background:'var(--pbe)',
                animation:'calcBar .8s var(--ease) .5s both'}}/>
            </div>
          </div>
        )}
        {screen==='results'&&scores&&(
          <ResultsScreen scores={scores} rawScores={rawScores} profile={profile}
            peerMode={peerMode} peerFor={peerFor} onRestart={handleRestart}
            currentUser={currentUser} onShowAuth={(mode)=>{setAuthMode(mode||'login');setShowAuth(true);}}
            currentOrg={currentOrg}/>
        )}
      </main>
    </>
  );
}

// ── ADMIN INTELLIGENCE DASHBOARD ─────────────────────────────────────────────
function IntelligenceDashboard({results}) {
  if(results.length===0) return(
    <div className="card-lg" style={{textAlign:'center',padding:40}}>
      <div style={{fontSize:48,marginBottom:12}}>🔬</div>
      <h3 className="title" style={{marginBottom:8}}>No data yet</h3>
      <p className="small">Intelligence analysis requires at least one completed assessment.</p>
    </div>
  );

  const n=results.length;
  const avg=(key)=>results.reduce((s,r)=>s+(r[key]||0),0)/n;
  const sd=(key)=>{const m=avg(key);return Math.sqrt(results.reduce((s,r)=>s+Math.pow((r[key]||0)-m,2),0)/n);};

  // Dimension stats
  const stats={
    BA:{mean:avg('BA'),sd:sd('BA'),min:Math.min(...results.map(r=>r.BA||0)),max:Math.max(...results.map(r=>r.BA||0))},
    BD:{mean:avg('BD'),sd:sd('BD'),min:Math.min(...results.map(r=>r.BD||0)),max:Math.max(...results.map(r=>r.BD||0))},
    BR:{mean:avg('BR'),sd:sd('BR'),min:Math.min(...results.map(r=>r.BR||0)),max:Math.max(...results.map(r=>r.BR||0))},
    PBE:{mean:avg('PBEw'),sd:sd('PBEw'),min:Math.min(...results.map(r=>r.PBEw||0)),max:Math.max(...results.map(r=>r.PBEw||0))},
  };

  // Archetype counts
  const archCounts={};
  results.forEach(r=>{if(r.key)archCounts[r.key]=(archCounts[r.key]||0)+1;});

  // Industry breakdown
  const indGroups={};
  results.forEach(r=>{if(r.industry){if(!indGroups[r.industry])indGroups[r.industry]=[];indGroups[r.industry].push(r);}});

  // Employment breakdown
  const empGroups={};
  results.forEach(r=>{if(r.employment){if(!empGroups[r.employment])empGroups[r.employment]=[];empGroups[r.employment].push(r);}});

  // Distribution buckets (0-39, 40-59, 60-74, 75-89, 90-100)
  const buckets=(key)=>{
    const b=[0,0,0,0,0];
    results.forEach(r=>{const v=r[key]||0;if(v<40)b[0]++;else if(v<60)b[1]++;else if(v<75)b[2]++;else if(v<90)b[3]++;else b[4]++;});
    return b;
  };
  const BUCKET_LABELS=['0–39 Emerging','40–59 Developing','60–74 Established','75–89 Strong','90–100 Elite'];
  const BUCKET_COLORS=['#9A9A95','#F59E0B','#0A84FF','#1DB954','#8B5CF6'];

  // Pearson correlation between two arrays
  const pearsonR=(xs,ys)=>{
    const mx=xs.reduce((a,b)=>a+b)/xs.length;
    const my=ys.reduce((a,b)=>a+b)/ys.length;
    const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
    const den=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0)*ys.reduce((s,y)=>s+(y-my)**2,0));
    return den===0?0:num/den;
  };
  const BAvals=results.map(r=>r.BA||0);
  const BDvals=results.map(r=>r.BD||0);
  const BRvals=results.map(r=>r.BR||0);
  const PBEvals=results.map(r=>r.PBEw||0);

  const corrBAvsBD=n>=3?pearsonR(BAvals,BDvals):null;
  const corrBAvsBR=n>=3?pearsonR(BAvals,BRvals):null;
  const corrBDvsBR=n>=3?pearsonR(BDvals,BRvals):null;

  // Dissertation comparison
  const DISS={BA:66.86,BD:69.38,BR:48.46,PBE:64.06,n:65};
  const DISS_CORR={BAvsBD:0.822,BAvsBR:0.670,BDvsBR:0.645};

  const StatBox=({label,mean,sd,min,max,color})=>(
    <div style={{padding:16,borderRadius:14,background:color+'0A',border:`1.5px solid ${color}25`}}>
      <div style={{fontSize:11,fontWeight:700,color,marginBottom:6}}>{label}</div>
      <div style={{fontFamily:'var(--fd)',fontSize:28,fontWeight:800,color,lineHeight:1,marginBottom:8}}>
        {mean.toFixed(1)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:11,color:'var(--text3)'}}>
        <span>SD: <strong style={{color:'var(--text2)'}}>{sd.toFixed(1)}</strong></span>
        <span>Min: <strong style={{color:'var(--text2)'}}>{min.toFixed(1)}</strong></span>
        <span>Max: <strong style={{color:'var(--text2)'}}>{max.toFixed(1)}</strong></span>
        <span>n: <strong style={{color:'var(--text2)'}}>{n}</strong></span>
      </div>
    </div>
  );

  const DistBar=({dimKey,label,color})=>{
    const b=buckets(dimKey);
    const maxB=Math.max(...b,1);
    return(
      <div style={{marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color,marginBottom:8}}>{label} Distribution</div>
        {b.map((count,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
            <div style={{fontSize:10,color:'var(--text3)',width:90,flexShrink:0}}>{BUCKET_LABELS[i]}</div>
            <div style={{flex:1,height:14,background:'var(--border)',borderRadius:7,overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:7,
                background:BUCKET_COLORS[i],width:`${(count/maxB)*100}%`,
                transition:'width .8s ease .2s'}}/>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:BUCKET_COLORS[i],width:20,textAlign:'right'}}>{count}</div>
            <div style={{fontSize:10,color:'var(--text3)',width:36}}>{n>0?Math.round(count/n*100):0}%</div>
          </div>
        ))}
      </div>
    );
  };

  return(
    <div>
      {/* Header */}
      <div style={{marginBottom:24,padding:'20px 24px',background:'var(--pbe-l)',borderRadius:14,
        border:'1px solid var(--pbe)20'}}>
        <div style={{fontFamily:'var(--fd)',fontSize:20,fontWeight:800,color:'var(--pbe-text)',marginBottom:4}}>
          Intelligence Analysis · n={n} assessments
        </div>
        <div style={{fontSize:13,color:'var(--pbe-text)',opacity:.75}}>
          Dissertation-style statistical analysis of collected PBES data. Compared against Szántó (2025) reference sample (n=65).
        </div>
      </div>

      {/* Dimension Summary Stats */}
      <div className="card-lg" style={{marginBottom:20}}>
        <h3 className="subtitle" style={{marginBottom:4}}>Dimension Summary Statistics</h3>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>Mean · SD · Min · Max (n={n} users vs. dissertation n={DISS.n})</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
          <StatBox label="Brand Appeal (BA)" mean={stats.BA.mean} sd={stats.BA.sd} min={stats.BA.min} max={stats.BA.max} color={DC.BA}/>
          <StatBox label="Brand Differentiation (BD)" mean={stats.BD.mean} sd={stats.BD.sd} min={stats.BD.min} max={stats.BD.max} color={DC.BD}/>
          <StatBox label="Brand Recognition (BR)" mean={stats.BR.mean} sd={stats.BR.sd} min={stats.BR.min} max={stats.BR.max} color={DC.BR}/>
          <StatBox label="Overall PBE (weighted)" mean={stats.PBE.mean} sd={stats.PBE.sd} min={stats.PBE.min} max={stats.PBE.max} color="var(--pbe)"/>
        </div>
        {/* Comparison row vs dissertation */}
        <div style={{padding:'14px 16px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'.04em',textTransform:'uppercase'}}>
            Dissertation Reference (Szántó 2025, n=65) vs. This Sample (n={n})
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {[
              {label:'BA',diss:DISS.BA,user:stats.BA.mean,color:DC.BA},
              {label:'BD',diss:DISS.BD,user:stats.BD.mean,color:DC.BD},
              {label:'BR',diss:DISS.BR,user:stats.BR.mean,color:DC.BR},
              {label:'PBE',diss:DISS.PBE,user:stats.PBE.mean,color:'var(--pbe)'},
            ].map(d=>{
              const diff=d.user-d.diss;
              return(
                <div key={d.label} style={{textAlign:'center'}}>
                  <div style={{fontSize:10,fontWeight:700,color:d.color,marginBottom:3}}>{d.label}</div>
                  <div style={{fontSize:13,fontWeight:700}}>{d.user.toFixed(1)} <span style={{fontSize:10,color:'var(--text3)'}}>vs {d.diss}</span></div>
                  <div style={{fontSize:11,fontWeight:600,color:diff>=0?'var(--success)':'var(--warn)'}}>
                    {diff>=0?'+':''}{diff.toFixed(1)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Score Distributions */}
      <div className="card-lg" style={{marginBottom:20}}>
        <h3 className="subtitle" style={{marginBottom:4}}>Score Distributions</h3>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>Frequency by score band — mirrors dissertation Table 3 analysis</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
          <DistBar dimKey="BA" label="Brand Appeal" color={DC.BA}/>
          <DistBar dimKey="BD" label="Brand Differentiation" color={DC.BD}/>
          <DistBar dimKey="BR" label="Brand Recognition" color={DC.BR}/>
          <DistBar dimKey="PBEw" label="Overall PBE" color="var(--pbe)"/>
        </div>
        <div style={{padding:'12px 14px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)',
          fontSize:12,color:'var(--text2)',lineHeight:1.65}}>
          <strong>Dissertation finding:</strong> BA and BD show left-skewed distributions (ceiling effects at 60–80 range, skewness BA=−0.789, BD=−0.543), while BR is symmetric (skewness BR=−0.109). The critical gap: BA/BD average ~68, BR averages ~48 — a persistent 20-point visibility deficit. Check if this pattern holds in your sample.
        </div>
      </div>

      {/* Archetype Distribution */}
      <div className="card-lg" style={{marginBottom:20}}>
        <h3 className="subtitle" style={{marginBottom:4}}>Archetype Distribution</h3>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>Comparison: this sample vs. dissertation (n=65)</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{borderBottom:'2px solid var(--border)'}}>
                {['Archetype','BA','BD','BR','This Sample','Dissertation (n=65)','Δ'].map(h=>(
                  <th key={h} style={{padding:'8px 12px',textAlign:'left',color:'var(--text3)',fontWeight:600,fontSize:11}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                {k:'HHH',diss:27.7},{k:'HHL',diss:44.6},{k:'HLH',diss:0.0},{k:'HLL',diss:3.1},
                {k:'LHH',diss:1.5},{k:'LHL',diss:6.2},{k:'LLH',diss:0.0},{k:'LLL',diss:16.9},
              ].map(row=>{
                const ar=ARCH[row.k];
                const count=archCounts[row.k]||0;
                const pct=n>0?Math.round(count/n*100):0;

                return(
                  <tr key={row.k} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'10px 12px'}}>
                      <span style={{color:ar?.color,fontWeight:600}}>{ar?.emoji} {ar?.name||row.k}</span>

                    </td>

            </tbody>
          </table>
        </div>
      </div>

      {/* Correlations */}
      {n>=3&&(
        <div className="card-lg" style={{marginBottom:20}}>
          <h3 className="subtitle" style={{marginBottom:4}}>Dimension Correlations</h3>

              {label:'BA ↔ BD',r:corrBAvsBD,diss:DISS_CORR.BAvsBD,predicted:0.781},
              {label:'BA ↔ BR',r:corrBAvsBR,diss:DISS_CORR.BAvsBR,predicted:0.376},
              {label:'BD ↔ BR',r:corrBDvsBR,diss:DISS_CORR.BDvsBR,predicted:0.347},

                  {['Employment Group','n','BA','BD','BR','PBE','vs. Overall PBE'].map(h=>(

                  const mBA=rows.reduce((s,r)=>s+(r.BA||0),0)/rows.length;
                  const mBD=rows.reduce((s,r)=>s+(r.BD||0),0)/rows.length;
                  const mBR=rows.reduce((s,r)=>s+(r.BR||0),0)/rows.length;
                  const mPBE=rows.reduce((s,r)=>s+(r.PBEw||0),0)/rows.length;
                  const delta=mPBE-stats.PBE.mean;
                  return(

                      <td style={{padding:'10px 10px',color:DC.BD,fontWeight:600}}>{mBD.toFixed(1)}</td>
                      <td style={{padding:'10px 10px',color:DC.BR,fontWeight:600}}>{mBR.toFixed(1)}</td>
                      <td style={{padding:'10px 10px',color:'var(--pbe)',fontWeight:700}}>{mPBE.toFixed(1)}</td>
                      <td style={{padding:'10px 10px',fontWeight:600,
                        color:delta>=0?'var(--success)':'var(--warn)'}}>

            <div style={{fontWeight:700,fontSize:13,color:'var(--pbe-text)',marginBottom:4}}>{i+1}. {item.title}</div>
            <div style={{fontSize:12.5,color:'var(--text2)',lineHeight:1.65}}>{item.body}</div>
          </div>
        ))}
      </div>

      <div style={{padding:'14px 16px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)',
        fontSize:12,color:'var(--text3)',lineHeight:1.6}}>
        <strong>Data caveat:</strong> This live sample (n={n}) is compared against the dissertation reference (n=65, predominantly Hungarian young professionals). Generalizability improves with sample size. Demographic differences (age, industry, country) affect benchmark validity. The 60-point threshold was calibrated to the dissertation sample; re-calibration may be needed for senior or international samples.
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel() {
  const [auth,setAuth]=useState(()=>localStorage.getItem('pbe_admin')==='true');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [detail,setDetail]=useState(null);
  const [peerLinks,setPeerLinks]=useState(()=>JSON.parse(localStorage.getItem('pbe_peer_links')||'{}'));
  const [copiedIdx,setCopiedIdx]=useState(null);
  const [results,setResults]=useState(()=>JSON.parse(localStorage.getItem('pbe_results')||'[]'));
  const [adminTab,setAdminTab]=useState('overview'); // 'overview' | 'intelligence' | 'users'

  const refresh=()=>setResults(JSON.parse(localStorage.getItem('pbe_results')||'[]'));

  const exportCSV=()=>{
    const cols=['Name','Title','LinkedIn','Archetype','BA','BD','BR','PBEw','PBEr','Date'];
    const rows=results.map(r=>[
      r.name||'',r.title||'',r.linkedin||'',
      ARCH[r.key]?.name||r.key||'',
      Math.round(r.BA||0),Math.round(r.BD||0),Math.round(r.BR||0),
      Math.round(r.PBEw||0),Math.round(r.PBEr||0),r.date||''
    ]);
    const csv=[cols,...rows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`pbe-results-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const login=()=>{
    if(pw==='pbes2025admin'){localStorage.setItem('pbe_admin','true');setAuth(true);}
    else{setErr('Incorrect password');setTimeout(()=>setErr(''),2000);}
  };

  const savePeerLinks=(updated)=>{
    setPeerLinks(updated);
    localStorage.setItem('pbe_peer_links',JSON.stringify(updated));
  };

  const genPeerLink=(rid,name)=>{
    const base=window.location.href.split('?')[0];
    const url=`${base}?peer=1&for=${encodeURIComponent(name||'colleague')}`;
    const updated={...peerLinks,[rid]:[...(peerLinks[rid]||[]),{url,created:new Date().toLocaleDateString()}]};
    savePeerLinks(updated);
  };

  const copyLink=(url,idx)=>{
    navigator.clipboard?.writeText(url).then(()=>{setCopiedIdx(idx);setTimeout(()=>setCopiedIdx(null),2000);});
  };

  const deleteResult=(i)=>{
    if(!confirm('Delete this assessment?')) return;
    const updated=results.filter((_,j)=>j!==i);
    setResults(updated);
    localStorage.setItem('pbe_results',JSON.stringify(updated));
  };

  if(!auth) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'var(--bg)',padding:20}}>
      <div className="card-xl" style={{maxWidth:380,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:12}}>🔐</div>
        <h2 className="title" style={{marginBottom:8}}>Admin Access</h2>
        <p className="small" style={{marginBottom:20}}>Personal Brand Equity Calculator · Superadmin Panel</p>
        <label htmlFor="admin-pw" className="sr-only">Admin Password</label>
        <input id="admin-pw" className="inp" type="password" placeholder="Admin password"
          value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&login()}
          style={{marginBottom:12,textAlign:'center'}}/>
        {err&&<div className="toast toast--error" style={{marginBottom:8}}>{err}</div>}
        <button className="btn btn-p" style={{width:'100%'}} onClick={login}>Login →</button>
      </div>
    </div>
  );

  // ── Detail Modal
  if(detail!==null) {
    const r=results[detail];
    const ar=ARCH[r?.key];
    if(!r) return null;
    return(
      <div style={{minHeight:'100vh',background:'var(--bg)',padding:'40px 20px'}}>
        <div style={{maxWidth:800,margin:'0 auto'}}>
          <button className="btn btn-s" onClick={()=>setDetail(null)} style={{marginBottom:20}}>← Back to Dashboard</button>
          <div className="card-xl" style={{marginBottom:20}}>
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
              <div style={{fontSize:48}}>{ar?.emoji}</div>
              <div>
                <div className="chip" style={{background:ar?.color+'18',color:ar?.color,marginBottom:6}}>{r.key}</div>
                <h2 className="headline" style={{color:ar?.color,marginBottom:2}}>{ar?.name}</h2>
                <div style={{fontSize:13,color:'var(--text3)'}}>{r.name||'Anonymous'} · {r.date||'—'} {r.title?`· ${r.title}`:''}</div>
              </div>
              <div style={{marginLeft:'auto',textAlign:'right'}}>
                <div style={{fontFamily:'var(--fd)',fontSize:42,fontWeight:800,color:ar?.color,lineHeight:1}}>{Math.round(r.PBEw||0)}</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>PBE Score</div>
              </div>
            </div>
            <div className="g3" style={{marginBottom:20}}>
              {[{l:'Brand Appeal',v:r.BA,c:DC.BA},{l:'Brand Differentiation',v:r.BD,c:DC.BD},{l:'Brand Recognition',v:r.BR,c:DC.BR}].map(d=>(
                <div key={d.l} style={{padding:16,borderRadius:12,background:d.c+'0C',border:`1.5px solid ${d.c}30`}}>
                  <div style={{fontSize:11,fontWeight:700,color:d.c,marginBottom:4}}>{d.l}</div>
                  <div style={{fontFamily:'var(--fd)',fontSize:32,fontWeight:800,color:d.c,lineHeight:1}}>{Math.round(d.v||0)}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>/100 · {(d.v||0)>=60?'HIGH':'LOW'}</div>
                  <div style={{marginTop:8,height:5,background:d.c+'20',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',background:d.c,borderRadius:3,width:`${d.v||0}%`}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{fontSize:14,color:'var(--text2)',lineHeight:1.7,marginBottom:16}}>{ar?.desc}</div>
            {r.linkedin&&<div style={{fontSize:13,color:'var(--text3)',marginBottom:8}}>
              🔗 LinkedIn: <a href={r.linkedin} target="_blank" rel="noreferrer" style={{color:'var(--blue)'}}>{r.linkedin}</a>
            </div>}
          </div>
          <div className="card-lg" style={{marginBottom:20}}>
            <h3 className="subtitle" style={{marginBottom:12}}>Peer Rating Links</h3>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>
              Generate and share links for colleagues to rate <strong>{r.name||'this person'}</strong>.
            </div>
            <button className="btn btn-s" style={{fontSize:13,marginBottom:12}}
              onClick={()=>genPeerLink(detail,r.name)}>+ Generate New Peer Link</button>
            {(peerLinks[detail]||[]).length===0?(
              <div style={{fontSize:13,color:'var(--text3)'}}>No peer links generated yet.</div>
            ):(peerLinks[detail]||[]).map((pl,pi)=>(
              <div key={pi} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,
                padding:'8px 12px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
                <span style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>#{pi+1} · {pl.created}</span>
                <span style={{fontFamily:'monospace',fontSize:11,color:'var(--text2)',flex:1,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pl.url}</span>
                <button className="btn btn-s" style={{fontSize:11,padding:'4px 10px',borderRadius:8}}
                  onClick={()=>copyLink(pl.url,`${detail}-${pi}`)}>
                  {copiedIdx===`${detail}-${pi}`?'✓ Copied':'Copy'}
                </button>
              </div>
            ))}
          </div>
          <div className="card-lg">
            <h3 className="subtitle" style={{marginBottom:12}}>Development Recommendations</h3>
            {(ar?.recs||[]).map((rec,ri)=>(
              <div key={ri} style={{marginBottom:16,paddingBottom:16,
                borderBottom:ri<(ar.recs.length-1)?'1px solid var(--border)':'none'}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:'var(--text)'}}>{ri+1}. {rec.title}</div>
                <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.65}}>{rec.detail}</div>
                {rec.timeframe&&<div style={{marginTop:6,fontSize:11,color:ar?.color,fontWeight:600}}>⏱ {rec.timeframe}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const archetypeCounts={};
  results.forEach(r=>{if(r.key)archetypeCounts[r.key]=(archetypeCounts[r.key]||0)+1;});
  const avgBA=results.length?results.reduce((s,r)=>s+(r.BA||0),0)/results.length:0;
  const avgBD=results.length?results.reduce((s,r)=>s+(r.BD||0),0)/results.length:0;
  const avgBR=results.length?results.reduce((s,r)=>s+(r.BR||0),0)/results.length:0;

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:'40px 20px'}}>
      <div style={{maxWidth:900,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>
          <div>
            <div className="chip" style={{background:'var(--text)',color:'#fff',marginBottom:8}}>Superadmin</div>
            <h1 className="headline">Admin Dashboard</h1>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-s" style={{fontSize:13}} onClick={refresh}>↻ Refresh</button>
            <button className="btn btn-s" onClick={()=>{localStorage.removeItem('pbe_admin');setAuth(false);}}>
              Sign Out
            </button>
          </div>
        </div>

        {/* Tab Nav */}
        <div style={{display:'flex',gap:0,marginBottom:24,background:'var(--surface)',borderRadius:12,
          padding:4,border:'1px solid var(--border)',width:'fit-content'}}>
          {[
            {k:'overview',label:'📋 Overview'},
            {k:'intelligence',label:'🔬 Intelligence'},
            {k:'users',label:'👤 Users & Orgs'},
          ].map(t=>(
            <button key={t.k} onClick={()=>setAdminTab(t.k)}
              style={{padding:'8px 18px',borderRadius:9,border:'none',cursor:'pointer',
                fontWeight:600,fontSize:13,transition:'all .15s',
                background:adminTab===t.k?'var(--text)':'transparent',
                color:adminTab===t.k?'#fff':'var(--text2)'}}>
              {t.label}
            </button>
          ))}
        </div>

        <div className="g4" style={{marginBottom:24}}>
          {[
            {label:'Total Assessments',value:results.length,color:'var(--pbe)'},
            {label:'Avg Brand Appeal',value:`${Math.round(avgBA)}%`,color:DC.BA},
            {label:'Avg Differentiation',value:`${Math.round(avgBD)}%`,color:DC.BD},
            {label:'Avg Recognition',value:`${Math.round(avgBR)}%`,color:DC.BR},
          ].map(s=>(
            <div key={s.label} className="card card-p" style={{textAlign:'center'}}>
              <div style={{fontFamily:'var(--fd)',fontSize:32,fontWeight:800,color:s.color}}>{s.value}</div>
              <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* ── INTELLIGENCE TAB ── */}
        {adminTab==='intelligence'&&<IntelligenceDashboard results={results}/>}

        {/* ── USERS & ORGS TAB ── */}
        {adminTab==='users'&&(
          <div>
            <div className="card-lg" style={{marginBottom:20}}>
              <h3 className="subtitle" style={{marginBottom:12}}>Registered Users</h3>
              {(()=>{
                const users=JSON.parse(localStorage.getItem('pbe_users')||'[]');
                if(!users.length) return <div className="small">No registered users yet.</div>;
                return(
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead><tr style={{borderBottom:'2px solid var(--border)'}}>
                      {['Name','Email','Registered'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:600,color:'var(--text3)',fontSize:11}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{users.map((u,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'10px 10px'}}>{u.name||'—'}</td>
                        <td style={{padding:'10px 10px',color:'var(--text3)'}}>{u.email}</td>
                        <td style={{padding:'10px 10px',color:'var(--text3)'}}>{u.created?new Date(u.created).toLocaleDateString():'—'}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                );
              })()}
            </div>
            <div className="card-lg" style={{marginBottom:20}}>
              <h3 className="subtitle" style={{marginBottom:12}}>Registered Organizations</h3>
              {(()=>{
                const orgs=JSON.parse(localStorage.getItem('pbe_orgs')||'[]');
                if(!orgs.length) return <div className="small">No organizations yet.</div>;
                return(
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead><tr style={{borderBottom:'2px solid var(--border)'}}>
                      {['Org Name','Industry','Admin Email','Join Code','Created'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:600,color:'var(--text3)',fontSize:11}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{orgs.map((o,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'10px 10px',fontWeight:500}}>{o.name}</td>
                        <td style={{padding:'10px 10px',color:'var(--text3)'}}>{o.industry||'—'}</td>
                        <td style={{padding:'10px 10px',color:'var(--text3)'}}>{o.adminEmail}</td>
                        <td style={{padding:'10px 10px',fontFamily:'monospace',fontWeight:700,color:'var(--pbe)'}}>{o.joinCode}</td>
                        <td style={{padding:'10px 10px',color:'var(--text3)'}}>{o.created||'—'}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                );
              })()}
            </div>
          </div>
        )}

        {adminTab==='overview'&&results.length>0&&(
          <>
          <div className="card-lg" style={{marginBottom:24}}>
            <h3 className="subtitle" style={{marginBottom:16}}>Archetype Distribution</h3>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {Object.entries(archetypeCounts).sort((a,b)=>b[1]-a[1]).map(([k,n])=>{
                const ar=ARCH[k];
                return(<div key={k} style={{padding:'10px 16px',borderRadius:12,
                  background:`${ar?.color||'#888'}14`,border:`1.5px solid ${ar?.color||'#888'}30`}}>
                  <div style={{fontSize:18}}>{ar?.emoji||'❓'}</div>
                  <div style={{fontWeight:700,fontSize:13}}>{ar?.name||k}</div>
                  <div style={{fontSize:20,fontWeight:800,color:ar?.color,fontFamily:'var(--fd)'}}>{n}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{Math.round(n/results.length*100)}%</div>
                </div>);
              })}
            </div>
          </div>

          <div className="card-lg" style={{marginBottom:24}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4,gap:12,flexWrap:'wrap'}}>
              <h3 className="subtitle">All Assessments ({results.length})</h3>
              <button className="btn btn-s" style={{fontSize:12,padding:'6px 14px',flexShrink:0}}
                onClick={exportCSV} title="Download all results as CSV">
                ⬇ Export CSV
              </button>
            </div>
            <div className="small" style={{marginBottom:14}}>Click any row to view full results, recommendations, and manage peer links.</div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:'2px solid var(--border)'}}>
                    {['Name','Archetype','BA','BD','BR','PBE','Date','Actions'].map(h=>(
                      <th key={h} style={{padding:'8px 12px',textAlign:'left',color:'var(--text3)',fontWeight:600}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {results.map((r,i)=>{
                    const ar=ARCH[r.key];
                    const linkCount=(peerLinks[i]||[]).length;
                    return(<tr key={i}
                      onClick={()=>setDetail(i)}
                      style={{borderBottom:'1px solid var(--border)',cursor:'pointer',
                        transition:'background .12s'}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <td style={{padding:'10px 12px',fontWeight:500}}>{r.name||'—'}</td>
                      <td style={{padding:'10px 12px'}}>
                        <span style={{color:ar?.color,fontWeight:600}}>{ar?.emoji} {ar?.name||r.key}</span>
                      </td>
                      <td style={{padding:'10px 12px',color:DC.BA,fontWeight:600}}>{Math.round(r.BA||0)}%</td>
                      <td style={{padding:'10px 12px',color:DC.BD,fontWeight:600}}>{Math.round(r.BD||0)}%</td>
                      <td style={{padding:'10px 12px',color:DC.BR,fontWeight:600}}>{Math.round(r.BR||0)}%</td>
                      <td style={{padding:'10px 12px',color:'var(--pbe)',fontWeight:700}}>{Math.round(r.PBEw||0)}%</td>
                      <td style={{padding:'10px 12px',color:'var(--text3)'}}>{r.date||'—'}</td>
                      <td style={{padding:'10px 12px'}} onClick={e=>e.stopPropagation()}>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-s" style={{fontSize:11,padding:'4px 10px',borderRadius:8}}
                            onClick={()=>setDetail(i)}>View</button>
                          <button className="btn btn-s" style={{fontSize:11,padding:'4px 10px',borderRadius:8,
                            color:linkCount>0?'var(--blue)':'var(--text3)'}}
                            onClick={()=>genPeerLink(i,r.name)}>
                            🔗 {linkCount>0?`${linkCount} links`:'Add link'}
                          </button>
                          <button style={{fontSize:11,padding:'4px 8px',borderRadius:'var(--r-sm)',cursor:'pointer',
                            border:'1px solid var(--border)',background:'none',color:'var(--error)'}}
                            onClick={()=>deleteResult(i)}>✕</button>
                        </div>
                      </td>
                    </tr>);
                  })}
                </tbody>
              </table>
            </div>
          </div>
          </>
        )}
        {adminTab==='overview'&&results.length===0&&(
          <div className="card-lg" style={{textAlign:'center',padding:40}}>
            <div style={{fontSize:48,marginBottom:12}}>📊</div>
            <h3 className="title" style={{marginBottom:8}}>No assessments yet</h3>
            <p className="small">Completed assessments will appear here automatically. They are saved to localStorage.</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
