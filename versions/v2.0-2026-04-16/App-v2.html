<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Brand Equity Calculator · PBES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Surface & Border ────────────────────────────── */
  --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#FAFAF8;
  --border:#E8E6E0;--border-d:#B0ADA6;
  --white:#FFFFFF;

  /* ── Text ────────────────────────────────────────── */
  --text:#1A1A18;--text2:#4A4A45;--text3:#6F6F6C;

  /* ── Brand / Dimension Colors ────────────────────── */
  --blue:#0A84FF;--blue-d:#006FD9;
  --ba:#E8442A;--ba-l:#FFECEA;--ba-d:#C23520;
  --bd:#1DB954;--bd-l:#E6F9EC;--bd-d:#17963F;
  --br:#0A84FF;--br-l:#E8F3FF;--br-d:#006FD9;
  --pbe:#8B5CF6;--pbe-l:#F3EEFF;--pbe-d:#7040D4;
  --bi:#F59E0B;--bi-l:#FEF3C7;--bi-d:#D97706;

  /* ── Semantic State Colors ───────────────────────── */
  --error:#E03E3E;--error-l:#FFF0F0;--error-d:#C42E2E;
  --success:#1DB954;--success-l:#E6F9EC;--success-d:#17963F;
  --warn:#F59E0B;--warn-l:#FEF3C7;--warn-d:#D97706;
  --info:#0A84FF;--info-l:#E8F3FF;

  /* ── Accessible text-on-colored-bg (WCAG AA ≥4.5:1) ─ */
  --ba-text:#B83020;   /* on --ba-l  #FFECEA ≈5.0:1 */
  --bd-text:#0A6B2A;   /* on --bd-l  #E6F9EC ≈5.5:1 */
  --br-text:#005BB8;   /* on --br-l  #E8F3FF ≈5.2:1 */
  --bi-text:#78350F;   /* on --bi-l  #FEF3C7 ≈7.3:1 */
  --pbe-text:#5930B0;  /* on --pbe-l #F3EEFF ≈5.5:1 */
  --success-text:#0A6B2A; /* on --success-l #E6F9EC ≈5.5:1 */
  --warn-text:#78350F;    /* on --warn-l    #FEF3C7 ≈7.3:1 */
  --info-text:#005BB8;    /* on --info-l    #E8F3FF ≈5.2:1 */

  /* ── Radius Scale ────────────────────────────────── */
  --r-xs:4px;--r-sm:8px;--r:14px;--r-lg:20px;--r-xl:28px;--r-pill:980px;

  /* ── Shadow Scale ────────────────────────────────── */
  --sh:0 1px 4px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --sh-md:0 2px 8px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.09);
  --sh-lg:0 4px 16px rgba(0,0,0,.08),0 24px 64px rgba(0,0,0,.12);

  /* ── Typography Scale ────────────────────────────── */
  --fs-2xs:9px;--fs-xs:11px;--fs-sm:13px;--fs-base:15px;--fs-md:16px;
  --fs-lg:18px;--fs-xl:20px;--fs-2xl:24px;--fs-3xl:32px;--fs-4xl:48px;

  /* ── Spacing Scale (4px base) ────────────────────── */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;
  --sp-6:24px;--sp-7:28px;--sp-8:32px;--sp-9:40px;--sp-10:48px;

  /* ── Motion Tokens ───────────────────────────────── */
  --dur-fast:120ms;--dur-base:180ms;--dur-slow:300ms;--dur-xslow:550ms;
  --ease:cubic-bezier(.4,0,.2,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(0,0,.2,1);

  /* ── Z-index Scale ───────────────────────────────── */
  --z-base:1;--z-raise:50;--z-overlay:100;--z-modal:200;--z-top:300;

  /* ── Font Families ───────────────────────────────── */
  --fd:'Bricolage Grotesque',system-ui,sans-serif;
  --fb:'DM Sans',system-ui,sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:0 24px}

/* Cards */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border)}
.card-p{padding:20px}
.card-lg{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);border:1px solid var(--border);padding:28px}
.card-xl{background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--sh-lg);border:1px solid var(--border);padding:36px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--fb);font-size:var(--fs-base);font-weight:600;border:none;cursor:pointer;
  border-radius:var(--r-pill);padding:12px 24px;transition:all var(--dur-base);letter-spacing:-.01em}
.btn-p{background:var(--text);color:var(--white)}
.btn-p:hover{background:var(--text2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.btn-p:focus-visible{outline:2px solid var(--text);outline-offset:3px}
.btn-s{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-s:hover{background:var(--bg);transform:translateY(-1px)}
.btn-s:focus-visible{outline:2px solid var(--text);outline-offset:3px}
.btn-lg{font-size:17px;padding:15px 32px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* Typography */
.display{font-family:var(--fd);font-size:clamp(40px,6vw,72px);font-weight:800;line-height:1.02;letter-spacing:-.03em}
.headline{font-family:var(--fd);font-size:clamp(26px,4vw,42px);font-weight:700;line-height:1.1;letter-spacing:-.02em}
.title{font-family:var(--fd);font-size:22px;font-weight:700;line-height:1.2;letter-spacing:-.015em}
.subtitle{font-family:var(--fd);font-size:17px;font-weight:600;letter-spacing:-.01em}
.body{font-size:16px;line-height:1.7;color:var(--text2)}
.small{font-size:13px;line-height:1.6;color:var(--text3)}
.label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

/* Progress */
.track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1) .3s}
.prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:680px){
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}
  .wrap{padding:0 16px}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin360{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes spinIn{from{opacity:0;transform:rotate(-12deg) scale(.9)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes calcBar{from{width:0}to{width:100%}}
.fu{animation:fadeUp var(--dur-xslow) var(--ease) both}
.fi{animation:fadeIn var(--dur-slow) ease both}
.si{animation:scaleIn .6s var(--ease-spring) both}
.spin{animation:spinIn .7s var(--ease-spring) both}
/* Reduced-motion support */
@media(prefers-reduced-motion:reduce){.fu,.fi,.si,.spin{animation:none}}

/* Question buttons */
.qbtn{flex:1;padding:12px 6px;border:2px solid var(--border);border-radius:var(--r);cursor:pointer;
  font-family:var(--fb);font-size:11.5px;font-weight:500;line-height:1.35;text-align:center;
  background:var(--surface);color:var(--text3);transition:all var(--dur-fast);margin:0 2px}
.qbtn:hover{border-color:var(--border-d);color:var(--text2);transform:translateY(-2px)}
.qbtn:focus-visible{outline:2px solid var(--text);outline-offset:2px}
.qbtn.on{color:var(--white);border-color:transparent;transform:translateY(-3px)}

/* Score ring container */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* Divider */
.divider{height:1px;background:var(--border);margin:28px 0}

/* Input styles */
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);
  font-family:var(--fb);font-size:var(--fs-base);color:var(--text);background:var(--surface);
  transition:border-color var(--dur-fast);outline:none}
.inp:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(26,26,24,.08)}
.inp:focus-visible{border-color:var(--text);box-shadow:0 0 0 3px rgba(26,26,24,.08)}
.inp::placeholder{color:var(--text3);opacity:.7}
.inp:disabled{opacity:.5;cursor:not-allowed;background:var(--surface2)}
.inp--error{border-color:var(--error)!important;box-shadow:0 0 0 3px rgba(224,62,62,.1)!important}
.inp--success{border-color:var(--success)!important;box-shadow:0 0 0 3px rgba(29,185,84,.1)!important}
.inp-sm{padding:8px 12px;font-size:14px}
/* Hide number-input spinners — metrics fields use explicit +/- or free entry */
input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* Chip variants — text colors use --*-text tokens (WCAG AA ≥4.5:1 on their light bg) */
.chip--ba{background:var(--ba-l);color:var(--ba-text)}
.chip--bd{background:var(--bd-l);color:var(--bd-text)}
.chip--br{background:var(--br-l);color:var(--br-text)}
.chip--bi{background:var(--bi-l);color:var(--bi-text)}
.chip--pbe{background:var(--pbe-l);color:var(--pbe-text)}
.chip--neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* Toast / inline message — text colors use --*-text tokens (WCAG AA ≥4.5:1) */
.toast{padding:10px 14px;border-radius:var(--r-sm);font-size:var(--fs-sm);font-weight:500;line-height:1.5}
.toast--error{background:var(--error-l);color:var(--error-d);border:1px solid rgba(224,62,62,.2)}
.toast--success{background:var(--success-l);color:var(--success-text);border:1px solid rgba(29,185,84,.2)}
.toast--warn{background:var(--warn-l);color:var(--warn-text);border:1px solid rgba(245,158,11,.2)}
.toast--info{background:var(--info-l);color:var(--info-text);border:1px solid rgba(10,132,255,.2)}

/* Layout utilities */
.flex-center{display:flex;align-items:center;justify-content:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-col{display:flex;flex-direction:column}
.text-center{text-align:center}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* Section header pattern */
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:var(--sp-5)}
.section-head__icon{font-size:var(--fs-xl);flex-shrink:0}
.section-head__title{font-family:var(--fd);font-size:var(--fs-xl);font-weight:700;letter-spacing:-.015em;color:var(--text)}
.section-head__sub{font-size:var(--fs-sm);color:var(--text3);margin-top:2px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-xs)}
::-webkit-scrollbar-thumb:hover{background:var(--border-d)}
/* Print */
@media print{.btn,.UserBar{display:none!important}.card-lg,.card-xl{break-inside:avoid}}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── SUPABASE AUTH HELPERS ─────────────────────────────────────────────────────
async function authSignUp(email, password, name) {
  if (!_supa) return { error: { message: 'Supabase not configured — using local storage fallback.' } };
  const { data, error } = await _supa.auth.signUp({
    email, password,
    options: { data: { name } }
  });
  return { data, error };
}

async function authSignIn(email, password) {
  if (!_supa) return { error: { message: 'Supabase not configured — using local storage fallback.' } };
  const { data, error } = await _supa.auth.signInWithPassword({ email, password });
  return { data, error };
}

async function authResetPassword(email) {
  if (!_supa) return { error: { message: 'Supabase not configured.' } };
  const { error } = await _supa.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/?login=1',
  });
  return { error };
}

async function authSignOut() {
  if (_supa) await _supa.auth.signOut();
}

// ── SUPABASE DATA HELPERS ─────────────────────────────────────────────────────
async function supabase_saveAssessment(entry, userId) {
  if (!_supa || !userId) return;
  try {
    await _supa.from('assessments').insert({
      user_id:      userId,
      name:         entry.name        || null,
      title:        entry.title       || null,
      industry:     entry.industry    || null,
      employment:   entry.employment  || null,
      seniority:    entry.seniority   || null,
      linkedin:     entry.linkedin    || null,
      ba:           entry.BA,
      bd:           entry.BD,
      br:           entry.BR,
      bi:           entry.BI         ?? null,
      pbe_w:        entry.PBEw,
      pbe_r:        entry.PBEr       ?? null,
      archetype_key:entry.key        || null,
      is_peer:      entry.isPeer     || false,
      rater_name:   entry.raterName  || null,
      peer_for:     entry.peerFor    || null,
      answers:      entry.answers    || null,
    });
  } catch(e) { console.warn('[supabase_saveAssessment]', e); }
}

async function supabase_loadAssessments(userId) {
  if (!_supa || !userId) return [];
  try {
    const { data } = await _supa
      .from('assessments')
      .select('*')
      .eq('user_id', userId)
      .order('created_at', { ascending: false })
      .limit(50);
    return data || [];
  } catch(e) { return []; }
}

// Dimension colors — hex values mirror :root tokens (--ba, --bd, --br, --bi).
// Must remain hex: used in SVG fill/stroke and for alpha concatenation (e.g. c+'18').
const DC={BA:'#E8442A',BD:'#1DB954',BR:'#0A84FF',BI:'#F59E0B'};
const DC_HEX=DC; // alias — use DC_HEX in SVG contexts for clarity
const DL={BA:'Brand Appeal',BD:'Brand Differentiation',BR:'Brand Recognition',BI:'Personal Brand Strategy'};
const DL_SHORT={BA:'Appeal',BD:'Differentiation',BR:'Recognition',BI:'Strategy'};

// ── ARCHETYPE DATA ─────────────────────────────────────────────────────────────
const ARCH = {
  HHH:{
    name:'The Brand Champion',emoji:'👑',focus:'Scale & sustain',color:'#8B5CF6',
    desc:"High scores on all three dimensions. Your image is compelling, your expertise is distinctly differentiated, and you're recognized across your industry. The PBES research identifies this as the strongest predictor of career advancement — you're at the top of the model.",
    strengths:[
      {title:'Complete Trifecta Achievement',detail:"Your scores confirm you've reached what the PBES model identifies as the pinnacle configuration. The dissertation's path analysis shows this profile correlates most strongly with career advancement (r=0.35) and job satisfaction (r=0.40). High scores on all three dimensions create a self-reinforcing cycle: Appeal builds trust, trust deepens Differentiation, Differentiation increases Recognition, Recognition amplifies Appeal."},

      {title:'Become a Headline Keynote Speaker',detail:"Move from conference panelist to headliner at 2–3 major events in your field within 12 months. Commission a professional speaker reel (5–7 minutes of your best stage moments). Keynote speaking positions you as the synthesizer of your field's best thinking, not merely a practitioner within it.",action:"Identify 10 target conferences; commission a speaker reel; pitch 3 event organizers this month.",timeframe:"6–12 months"},
      {title:'Build Strategic Brand Partnerships',detail:"Identify 3–5 brand champions in complementary fields whose audiences would genuinely benefit from exposure to your expertise. Propose structured collaborative content: co-authored articles, joint webinars, reciprocal media features. These partnerships compound both your differentiation and recognition in new markets more efficiently than any organic strategy.",action:"Map complementary high-profile peers; draft 3 collaboration proposals this month.",timeframe:"3–6 months"},
      {title:'Create a Personal Brand Advisory Board',detail:"Select 3–4 trusted peers who observe your brand from outside and can provide objective quarterly feedback on how your positioning lands. This accountability structure prevents the drift that high achievers frequently experience — becoming so focused on delivery quality that external brand signals degrade without anyone noticing.",action:"Identify 5 candidates; describe the 4×/year commitment; offer reciprocal participation.",timeframe:"1 month to set up"},

  HHL:{
    name:'The Magnetic Expert',emoji:'🧲',focus:'Boost visibility',color:'#F97316',
    desc:"You're appealing and highly differentiated — people enjoy working with you and you deliver clear, specific value. The gap is reach: your brand lives mostly inside your existing network. That's a solvable problem. With consistent visibility effort you have everything needed to become a recognized name in your field.",
    strengths:[
      {title:'Deep, Valued Expertise',detail:"Your high Brand Differentiation confirms that your work is genuinely different from peers. Clients don't just like you — they understand specifically what they get from working with you that they can't get elsewhere. This clarity of value proposition is the hardest component of brand equity to build and the one most correlated with premium pricing power and referral quality."},
      {title:'Compelling Professional Appeal',detail:"You're not just competent — you're someone people actively want to work with, collaborate with, and recommend. That combination of real expertise and interpersonal pull is rarer than it looks. The PBES research shows BA is the strongest driver of both differentiation (β=0.781) and recognition over time."},
      {title:'Strong Existing Relationships',detail:"Within your circle, you enjoy excellent reputation and repeat engagement. Client and colleague satisfaction rates are high. This relational capital, once amplified through visibility platforms, will scale into a much wider brand footprint. Your existing advocates are your most powerful marketing asset — they just need more opportunities to champion you."},
    ],
    challenges:[
      {title:'Invisible to Those Who Haven\'t Met You',detail:"Your low Brand Recognition reveals the core constraint: your brand exists primarily through direct relationships. You rely almost entirely on referrals from people who know you, with no systematic way for new audiences to discover your expertise. The dissertation's data shows this is the most common constraint for high-quality professionals — exceptional capability without the visibility infrastructure to scale it."},
      {title:'No Platform or Thought Leadership Presence',detail:"Professionals with your profile often have strong opinions, valuable methodologies, and earned insights — but no documented channel for sharing them. Without published content, speaking appearances, or media presence, your expertise is locked inside direct relationships. Each month without a platform is months of potential compound audience growth foregone."},
      {title:'Referral Dependency Risk',detail:"Relying entirely on referrals is invisible fragility. Network slowdowns, industry shifts, or a few key referrers moving on can sharply cut opportunity flow. Active visibility channels create resilience: multiple inbound sources and the ability to pursue specific opportunities rather than waiting for whatever the network sends."},
    ],
    recs:[
      {title:'Launch a Consistent LinkedIn Content Practice',detail:"Commit to 2–3 LinkedIn posts per week for 6 months minimum. Research on professional platform growth shows consistent quality beats sporadic brilliance — algorithm visibility builds compoundingly with posting frequency. Share your process, professional opinions, client success frameworks, and field observations.",action:"Write your first 5 posts this weekend; schedule them for M/W/F; set a 6-month streak goal.",timeframe:"Ongoing — 6 months to significant results"},
      {title:'Speak at 3–5 Industry Events This Year',detail:"Speaking is the highest-conversion visibility format: you reach many new people simultaneously while demonstrating expertise live. Start with niche conferences, meetups, or webinars in your specific domain. Pitch organizers with a concrete, specific talk title and clear audience benefit.",action:"Identify 10 events; write 3 specific talk pitches; submit applications within 30 days.",timeframe:"3–12 months for first engagement"},
      {title:'Build a Case Study Portfolio',detail:"Document 5 of your best client success stories in structured case study format: situation, approach, outcome, measurable results. Case studies are the highest-trust content format for professional services — they let prospects self-identify with your past client's problem and pre-sell themselves before contact.",action:"Choose your 5 best outcomes; outline each case study; publish one per month over 5 months.",timeframe:"5 months"},
      {title:'Optimize LinkedIn for Inbound Discovery',detail:"Rewrite your LinkedIn profile headline, About section, and Featured section for inbound search optimization. Your headline should name the specific problem you solve for a specific audience. Your About section should tell your professional story in first person and end with a clear call to action.",action:"Rewrite headline today (30 minutes); rewrite About section this week; request 3 new endorsements.",timeframe:"1–2 weeks"},
      {title:'Launch a Niche Podcast or Newsletter',detail:"An owned channel — podcast, newsletter, or YouTube series — is a high-leverage visibility investment at your stage. It establishes you as a curator in your field, reaches people who haven't met you, and keeps working between conversations. Start small: a biweekly email or monthly podcast only needs 2–3 hours per episode.",action:"Choose a format; set a launch date 60 days out; line up your first 4 guests or topics.",timeframe:"60 days to launch, 6+ months to build audience"},
    ],
  },
  HLH:{
    name:'The Charismatic Networker',emoji:'🌐',focus:'Deepen expertise',color:'#EC4899',
    desc:"You're visible and well-liked — people across your industry know you and enjoy your presence. The gap is specificity: your network recognises your name but may not know precisely what to hire or refer you for. The next step is narrowing from broad recognition to expert authority in a defined area.",

      {title:'Wide Network and Natural Likability',detail:"Your high Brand Appeal combined with strong Recognition means you occupy a rare position: both known and genuinely liked across your professional ecosystem. People introduce you to others, include you in opportunities, and think of you when relevant situations arise. This social capital is enormously valuable — most expertise-builders struggle for years to achieve the visibility you already have."},
      {title:'Cross-Industry Bridge Role',detail:"Charismatic Networkers often occupy unique connector positions — knowing people across different sectors, functions, and levels. This structural position in professional networks is associated with information advantage, cross-pollination opportunities, and the ability to facilitate high-value introductions. Your network is itself a form of differentiation if positioned correctly."},
      {title:'Distribution Already Built',detail:"You already have the audience most experts spend years developing. Your Brand Recognition is the distribution channel — what's missing is depth to fill it. Once your network has a specific, compelling reason to recommend you, the reach you've built converts into real opportunity."},

    challenges:[
      {title:'Known But Not Specific',detail:"Your low Brand Differentiation reveals the central gap: many people know you, but they can't clearly articulate what they'd specifically hire or refer you for. Being a great person to know is not the same as being the obvious choice for a specific high-value problem. The PBES model shows that without BD, BR tends to plateau — recognition without differentiation doesn't convert into premium opportunity."},
      {title:'Expertise Depth Deficit',detail:"Visibility-first brand builders often sacrifice deep specialization for broad connection. The risk is being seen as a generalist in a market that rewards specialists. Clients and employers making premium-rate decisions are looking for specialists, not generalists. A defined expertise niche, even in an adjacent area to your current work, transforms your positioning."},
      {title:'Content Authority Gap',detail:"Without documented work — articles, case studies, talks — every new relationship starts from zero. People who haven't met you have nothing to evaluate. Content changes that: your thinking stays online, builds trust in your absence, and gives new contacts a reason to reach out before you've even spoken."},
    ],
    recs:[
      {title:'Choose One Niche and Go Deep',detail:"The most important decision for a Charismatic Networker is choosing a specific expertise position and committing to it for at least 12–18 months. The specificity will feel narrowing but will actually unlock more opportunity — people refer for specific things. Identify the overlap between what you're genuinely excellent at, what the market pays premium for, and where your network most needs help.",action:"Write down your 3 potential niches; validate each with 5 contacts; commit to one within 30 days.",timeframe:"30 days to decide, 12–18 months to build"},
      {title:'Create a Signature Methodology',detail:"Develop and document a named process or framework for how you approach the core problem in your chosen niche. A named methodology transforms you from 'someone who does X' to 'the person who invented the Y approach to X.' It becomes a reference point in conversations, a content anchor for your writing, and a barrier to imitation.",action:"Draft your process as a 5-step framework; name it; create a one-pager; share with 10 trusted contacts.",timeframe:"60 days"},
      {title:'Pursue Deep Credentials',detail:"Invest in a formal qualification, certification, or structured learning program that provides both real capability depth and external validation signals. Advanced degrees, professional certifications, and completion of recognized programs provide credibility shortcuts — particularly valuable for someone with wide recognition wanting deeper expert positioning.",action:"Research the 3 most respected credentials in your chosen niche; apply to one within 60 days.",timeframe:"6–24 months depending on program"},
      {title:'Document and Publish Your Insights',detail:"Convert your existing knowledge into a structured writing practice. Start a biweekly LinkedIn article series on your chosen niche topic. The act of writing forces clarity — you will discover and sharpen insights you didn't know you had. Over 12 months, you'll have built a substantial public body of work that shifts how your network perceives your expertise depth.",action:"Write your first article this week (500–800 words); commit to biweekly publishing; track top-performing topics.",timeframe:"Immediate start, 6–12 months for significant impact"},
      {title:'Find a Domain Authority Mentor',detail:"Identify 1–2 recognized experts in your chosen niche who are 10+ years ahead of where you want to be. Request a formal mentoring arrangement or structured informational relationship. Association with a genuine domain authority accelerates your credibility-building, provides access to their network's trust, and gives you a reference point for measuring expertise development.",action:"List 5 potential mentors; reach out to 2 this month with a specific, time-bound ask.",timeframe:"1 month to initiate"},
    ],
  },
  HLL:{

      {title:'Clean, Intentional Foundation',detail:"Unlike professionals who built their brand organically and accumulated limiting associations, you have the opportunity to build deliberately from the beginning. Every choice you make now about expertise area, content, and association compounds without the drag of legacy positioning to overcome. This freedom has real value that established brands have long since traded away."},
      {title:'Exceptional Relationship-Building Capacity',detail:"High Brand Appeal consistently correlates with the ability to build warm, trusting professional relationships quickly. This translates into access — to mentors, opportunities, collaborators, and champions — that purely technical professionals often struggle to develop. Your social capital is a genuine competitive advantage that no credential or content can replicate."},

      {title:'No Specialized Expertise Position Yet',detail:"Without a clear expertise niche, you may be seen as versatile but not as the obvious choice for specific high-value assignments. Clients and employers making premium-rate decisions are looking for specialists. Defining a specific area where your appeal and developing expertise converge is the highest-priority strategic decision for your brand development."},
      {title:'Invisible Beyond Your Immediate Circle',detail:"Your brand currently exists primarily within your direct professional relationships. Without visibility platforms, online presence, or documented expertise, new contacts have no way to evaluate you before meeting you. Every month without a public brand presence is forgone compound growth."},

    recs:[
      {title:'Define Your Expertise Focus Area',detail:"The single highest-impact decision for a Rising Star is choosing a specific expertise focus and committing to it. Identify the intersection of: what you're genuinely curious about and could study indefinitely, what specific problems exist in your field that others don't solve well, and where your natural strengths create an unusual combination of capabilities.",action:"Spend 2 hours drafting your positioning statement; test it with 5 colleagues; refine based on reaction.",timeframe:"30 days"},
      {title:'Create a 12-Month Learning Roadmap',detail:"Design a structured learning plan to build deep expertise in your chosen area over the next 12 months. Include formal learning (courses, credentials, reading), experiential learning (projects, clients), and peer learning (mentors, communities). The discipline of a structured plan distinguishes expertise-builders from casual learners.",action:"Map your existing knowledge; identify your 3 biggest gaps; select one course or credential to start within 30 days.",timeframe:"12 months"},

      {title:'Activate Your Network Deliberately',detail:"Your natural likability gives you access to a wide potential network — but access only creates value when activated intentionally. Set a goal of 1–2 new meaningful professional connections per week, focused specifically on people in your chosen expertise area. Quality over quantity: 10 genuine relationships per month compounds powerfully over 12 months.",action:"Identify 20 target connections; send 5 personalized LinkedIn requests this week with a specific reason for connecting.",timeframe:"Ongoing"},

  LHH:{

    desc:"Your field knows your name, your work is differentiated, and your expertise is respected. The gap is warmth: your brand is authoritative but not always approachable. Layering in personal appeal — better storytelling, more visible relationships — is what takes you from respected expert to someone people actively want to engage with.",
    strengths:[
      {title:'Deep, Valued Expertise',detail:"Your high Brand Differentiation confirms that your professional work stands apart from peers in measurable, recognized ways. People seek you specifically for what you know and can do, not just because you're available. In a commoditizing professional landscape, genuine expertise differentiation is the most durable competitive advantage — it survives economic cycles, industry shifts, and competitive pressures in ways that visibility or likability alone cannot."},
      {title:'Field-Wide Name Recognition',detail:"Your Brand Recognition score confirms your professional standing extends well beyond your immediate circle. You are known in your field, referenced by others, and sought for your expertise. This level of recognition — built through consistent, high-quality delivery over time — represents a significant professional asset that most practitioners never achieve."},
      {title:'Deep Professional Trust',detail:"The combination of high differentiation and recognition creates deep professional trust. Your relationships, while perhaps fewer in number than a high-BA professional's, tend to be durable, deep, and high-value. People who work with you likely return repeatedly and recommend you with conviction, because your expertise creates genuine, documented results."},

      {title:'Missing the Personal Narrative',detail:"Expertise without story is less memorable and less referrable. When someone tells a colleague about you, they need both 'what you know' and 'who you are' — the combination creates the compelling word-of-mouth that drives premium opportunity. Many Distinguished Authorities have never invested in translating their expertise into accessible stories and personal narrative."},
      {title:'Network Depth Without Breadth',detail:"Your relationships tend to be deep in specific circles but may not extend broadly across the industry. The PBES data shows that diversified professional networks — where recognition comes from multiple distinct communities — creates more resilient, opportunity-rich brand equity. Broadening your relationship base compounds your existing recognition significantly."},

    recs:[
      {title:'Invest in Communication Coaching',detail:"Work with a professional communications coach or executive presence consultant to develop your ability to tell compelling stories about your expertise and professional journey. Technical experts often have remarkable stories they've never learned to tell effectively. Even 3–4 coaching sessions focused on personal narrative and storytelling structure can dramatically transform how you're perceived by new contacts.",action:"Research 3 executive communication coaches; book a trial session with your top choice within 30 days.",timeframe:"1–3 months"},
      {title:'Blend Personal and Professional on Social Media',detail:"Begin integrating personal perspective into your professional content on LinkedIn. Share not just your expertise conclusions but the experiences, observations, and human moments that led you to them. Even minor, professionally appropriate vulnerability creates the warmth signal that positions you as approachable and human, not just authoritative.",action:"Write one personal-perspective LinkedIn post this week; aim for 1 personal post per month alongside technical content.",timeframe:"Ongoing"},
      {title:'Mentor Others Publicly',detail:"Take on 1–2 formal mentoring relationships and share the experience publicly where appropriate. Mentoring signals both warmth and confidence — you're secure enough in your expertise to invest in others. It also creates the relational depth and genuine human connection that drives Appeal scores. Many Distinguished Authorities find mentoring their most fulfilling Appeal-building investment.",action:"Identify 2 potential mentees; reach out with a specific mentoring offer within 2 weeks.",timeframe:"Ongoing"},
      {title:'Actively Network at Events — Not Just Present',detail:"Transform your conference participation from speaking-only to genuine social engagement. Arrive early, attend receptions, approach speakers you admire, and follow up with everyone you meet within 24 hours. Distinguished Authorities often attend events but don't invest in the social fabric — the conversations before and after presentations where reputation-building actually happens most efficiently.",action:"Identify your next 3 industry events; commit to meeting 5 new people at each; implement a same-day follow-up system.",timeframe:"Ongoing"},

  LHL:{
    name:'The Hidden Gem',emoji:'💎',focus:'Increase visibility + appeal',color:'#1DB954',
    desc:"Your expertise is real, your work is high quality, and the people who know it trust it deeply. The problem is volume: too few people know about you. The gap between what you deliver and what the market perceives is your central opportunity — and it's more tractable than building the expertise itself.",
    strengths:[
      {title:'Exceptional Craft and Real Expertise',detail:"Your high Brand Differentiation is the most important foundation in the PBES model — the dissertation finds it hardest to fake, most correlated with genuine career outcomes, and most durable as a competitive advantage. You do work that is genuinely, tangibly better than peers, in ways that clients and colleagues can articulate. This is the foundation everything else should be built on, and you have it."},
      {title:'Deeply Trusted by Those Who Know Your Work',detail:"Within your existing client and colleague relationships, you enjoy exceptional trust and repeat engagement. People who've worked with you know precisely why they value you. This deep, earned trust within a small circle is both your most valuable current asset and the fuel for your visibility growth: your existing advocates, properly activated, can become your most powerful brand amplifiers."},
      {title:'Authenticity Over Performance',detail:"Hidden Gems tend to be motivated by the work itself, not the optics. That orientation is a real asset — people who know you know it's genuine. The challenge is making that authenticity visible. When genuine expertise gets shared honestly, it lands better than a polished brand performance. You have the harder-to-fake version."},
    ],
    challenges:[
      {title:'Almost Completely Invisible Outside Your Circle',detail:"Both Brand Appeal and Brand Recognition are low, meaning your brand operates almost entirely through direct relationships within a small network. The PBES data shows this profile has the largest gap between actual capability and market awareness — you are almost certainly undervalued relative to professionals who are less capable but more visible. This is correctable, but requires deliberate action."},
      {title:'The "Work Speaks for Itself" Trap',detail:"If you believe quality should be self-evident, that belief is costing you. The dissertation's data is clear: visibility is part of professional value, not a separate vanity exercise. Staying invisible doesn't protect the work's integrity — it limits its reach and impact."},
      {title:'No Platform or Content Presence',detail:"Without documented content — articles, case studies, speaking appearances — new contacts have no way to evaluate your expertise before engaging. You're requiring every potential relationship to start from zero, with no accumulated evidence of your capability. Each piece of content you publish works permanently as a trust-building asset."},
    ],
    recs:[
      {title:'Commit to Weekly LinkedIn Publishing',detail:"Start a consistent LinkedIn publishing practice immediately: one substantive post or article per week sharing a professional insight, process observation, or client lesson (anonymized). The compounding effect of consistent publishing over 6–12 months is dramatic — your existing connections will rediscover you as an expert, and your content will reach new audiences through their engagement.",action:"Write and publish your first LinkedIn post today (200–500 words); commit to weekly publishing for 6 months.",timeframe:"Immediate start, 6 months minimum commitment"},
      {title:'Write About Your Process and Methodology',detail:"Document how you do what you do. Your approach to your work — the specific steps, heuristics, and principles that make your output distinctive — is valuable, publishable content that most experts with your profile have never written down. Articles explaining your methodology simultaneously demonstrate expertise, attract clients who want that specific approach, and create a body of work that brand-builds over time.",action:"Write a 1,000-word article explaining your core work methodology; publish on LinkedIn; share with your existing network.",timeframe:"This month"},
      {title:'Join Professional Associations and Take Leadership Roles',detail:"Active participation in your field's professional associations — particularly committee membership, leadership roles, or event organization — creates structured visibility without requiring you to self-promote directly. Leadership roles in professional communities are merit-based and low-ego: you contribute expertise, the visibility follows.",action:"Identify the 2 most relevant professional associations; join both; volunteer for one committee within 60 days.",timeframe:"60 days to begin, 12+ months for full impact"},
      {title:'Collect and Publish LinkedIn Recommendations',detail:"Systematically request LinkedIn recommendations from your 10 best clients, colleagues, and collaborators. A recommendation is peer-published testimony about the specific value you deliver — more credible than anything you write about yourself. Request specific, results-focused recommendations that mention a specific outcome. Ten strong recommendations transform your profile from a CV into a portfolio of evidence.",action:"Write personalized recommendation requests to your 5 best recent collaborators; send this week.",timeframe:"30 days"},
      {title:'Partner with a Visibility-Strong Collaborator',detail:"Identify a colleague who has the audience reach you lack and who would benefit from association with your expertise depth. Propose a specific, bounded collaboration: a co-authored article, a joint presentation, or a shared webinar. This asymmetric visibility exchange — your expertise for their platform — is one of the fastest ways to reach new audiences authentically, without building a platform from scratch.",action:"Identify 3 potential visibility-strong collaborators; propose a specific collaboration to one this month.",timeframe:"30–60 days"},

  },
  LLH:{
    name:'The Recognized Professional',emoji:'🏆',focus:'Add depth and appeal',color:'#06B6D4',
    desc:"People in your field know your name, but recognition alone doesn't convert into real influence or premium opportunity. Your brand needs more substance behind the visibility — sharper expertise and more personal warmth. The foundation is solid; it's time to build on it.",
    strengths:[
      {title:'Established Industry Presence',detail:"Your Brand Recognition means your professional name carries weight in your field. People know who you are before they meet you, which shortens the trust-building cycle in new relationships. This is a significant asset that many deeply capable professionals spend years trying to develop. It represents social capital that, properly leveraged, can be converted into influence, opportunity, and authority."},
      {title:'Networked Across the Field',detail:"Recognition at scale typically accompanies broad professional relationships — you know many people across your industry and they know you. This network breadth is structurally valuable: you sit at the intersection of multiple professional communities, have access to diverse information flows, and have the potential to facilitate high-value connections."},
      {title:'Longevity and Professional Consistency',detail:"Recognition built over time signals reliability and staying power — qualities that differentiate you from newer voices who may be visible but unproven. Your professional longevity is evidence of resilience and sustained contribution to your field, even if the specific nature of your expertise hasn't been clearly articulated yet."},
    ],
    challenges:[
      {title:'Known Without a Clear Reason Why',detail:"Recognition without differentiation is the defining challenge of the Recognized Professional: many people know your name, but they can't clearly articulate what they'd specifically hire, recommend, or collaborate with you for. In the PBES model, BD is what converts recognition into premium opportunity. Without it, you're visible but not valuable in the specific, referrable way that drives exponential career growth."},
      {title:'Low Personal Appeal Signal',detail:"Low Brand Appeal may manifest as a perception of being technically capable but not particularly memorable or engaging. In an increasingly relationship-driven professional market, the ability to create genuine human connection alongside competence is a significant differentiator. Your recognition gives you the introduction; appeal is what makes the relationship deepen."},
      {title:'Value Proposition Unclear to Others',detail:"If your existing network can't clearly describe what you do that's specifically valuable, they can't effectively refer you, advocate for you in rooms you're not in, or position you for specific opportunities. Clarity of professional promise — the consistent, specific thing people can always count on you for — is the most important positioning investment for a Recognized Professional to make."},
    ],
    recs:[
      {title:'Define and Communicate Your Signature Expertise',detail:"Invest focused time in defining the one thing you are most distinctively good at and most distinctively valuable for. Write it as a clear, specific professional promise: 'I help [audience] achieve [outcome] through [specific approach].' Test this positioning with 10 trusted contacts — do they immediately understand it? Refine until it resonates, then communicate it consistently across all touchpoints.",action:"Draft your professional promise statement this week; test with 5 contacts; update LinkedIn headline and bio.",timeframe:"30 days"},
      {title:'Invest in One Deep Specialty Area',detail:"Choose a specific area of your field and pursue genuine expertise depth — through formal study, concentrated project experience, published research, or significant mentorship from domain authorities. The goal is to become genuinely, documentably expert in something specific enough that you're the obvious call for a particular type of problem.",action:"Identify your 3 potential specialty areas; choose one; create a 12-month expertise development plan.",timeframe:"12 months"},
      {title:'Work on Intentional Relationship Deepening',detail:"Shift your networking focus from breadth to depth: instead of adding more contacts, invest in deepening 20–30 existing relationships. Monthly check-ins, sharing relevant articles, making introductions, and showing genuine interest in others' work transforms transactional connections into advocates. One genuine advocate is worth more than 100 passive connections.",action:"Identify your 20 most valuable professional relationships; create a calendar reminder to reach out monthly.",timeframe:"Ongoing"},
      {title:'Create Original Insights — Not Just Curation',detail:"Move from sharing others' content to creating your own original analysis, perspective, and frameworks. Original insights — your specific take on industry developments, your methodology, your predictions — are what convert you from 'industry participant' to 'industry thought leader.' Start with your most contrarian professional opinion and make the case for it.",action:"Write your first original perspective piece (800–1,200 words) on a topic where you hold a minority but defensible view; publish on LinkedIn.",timeframe:"This month"},
      {title:'Develop Your Professional Promise Statement',detail:"Create and consistently communicate a clear 'professional promise' — the specific, consistent thing people can always count on you for. This promise becomes the anchor of your brand: every content piece, conversation opener, and LinkedIn bio update should reinforce it. A clear promise makes you referrable because it tells your network exactly when to think of you.",action:"Write your professional promise in one sentence; share with 5 trusted contacts for reaction; iterate until crisp.",timeframe:"30 days"},
    ],
  },
  LLL:{
    name:'The Emerging Brand',emoji:'🌱',focus:'Build all three foundations',color:'#64748B',
    desc:"Low scores across all three dimensions aren't a verdict — they're a starting point. Every strong professional brand was built, not born. Taking this assessment and knowing exactly where you stand is the first real act of brand development. You're building from scratch, which means you get to build it right.",
    strengths:[
      {title:'Clean Slate and Full Upside',detail:"Unlike professionals who built their brand inadvertently and accumulated limiting associations or positioning constraints, you have the opportunity to build exactly the brand you want from the beginning. Every decision — what expertise to develop, what content to publish, who to associate with — is still yours to make. This freedom has real value that established brands have long since traded away."},
      {title:'Awareness as a Real Advantage',detail:"Most professionals with low brand equity don't know it — they experience unexplained career constraints without understanding why. Completing this assessment puts you ahead of the majority of your peers who are still operating blind. Knowing exactly where the gaps are is not a small thing."},
      {title:'Early Investment Pays Off Most',detail:"The PBES research shows brand equity built early has the greatest long-term return. Every article you publish, every conference you speak at, every expertise-building relationship you start now will still be working for you years later. The same effort put in a decade from now won't produce the same result."},
    ],
    challenges:[
      {title:'All Three Dimensions Need Development',detail:"The primary challenge for an Emerging Brand is developing all three dimensions simultaneously without losing focus. The research recommends sequencing: develop Brand Appeal first (relationships, likability, professional image), then Brand Differentiation (expertise and unique value), then Brand Recognition (visibility and recognition). But all three require early attention in different proportions."},
      {title:'Risk of Scattered Effort',detail:"Without a clear strategy, effort spreads across too many things to gain traction anywhere. It's easy to do a little networking, a little LinkedIn, a little course-taking, and build depth in nothing. One focused brand-building activity per quarter, executed consistently, beats doing everything at half-effort."},
      {title:'Unclear Professional Identity',detail:"Low brand equity is often associated with uncertainty about professional identity: what you want to be known for, what you're genuinely best at, and who you most want to serve. This identity clarity is the prerequisite for effective brand development — without it, every brand-building action is undirected. The first investment should be in thinking, not in doing."},

// ── SCORE RING COMPONENT ──────────────────────────────────────────────────────
function ScoreRing({score,color,label,size=96,showHl=true}) {
  const r=(size-12)/2;
  const circ=2*Math.PI*r;
  const scoreOffset=circ-(score/100)*circ;
  const thA=(-90+360*0.6)*Math.PI/180;
  const tx=size/2+(r+3)*Math.cos(thA);
  const ty=size/2+(r+3)*Math.sin(thA);
  const tx2=size/2+(r+8)*Math.cos(thA);
  const ty2=size/2+(r+8)*Math.sin(thA);
  const isH=score>=60;
  return(
    <div className="ring-wrap" style={{width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{position:'absolute',top:0,left:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={7}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={7}
          strokeDasharray={circ} strokeDashoffset={scoreOffset} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{transition:'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) .3s'}}/>
        <line x1={tx} y1={ty} x2={tx2} y2={ty2} stroke={color} strokeWidth={2.5} opacity={.6}/>
      </svg>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
        <div style={{fontFamily:'var(--fd)',fontSize:size*.24,fontWeight:800,color,lineHeight:1}}>
          {Math.round(score)}
        </div>
        <div style={{fontSize:9,color:'var(--text3)',fontWeight:500,lineHeight:1}}>/ 100</div>
        {showHl&&<div style={{fontSize:8.5,fontWeight:700,marginTop:2,color:isH?color:'var(--text3)',
          background:isH?color+'18':'var(--border)',borderRadius:4,padding:'1px 6px'}}>
          {isH?'HIGH':'LOW'}
        </div>}
      </div>
    </div>
  );
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function calcScore(answers) {
  const b={BA:[],BD:[],BR:[],BI:[],s:[],e:[]};
  QS.forEach(q=>{
    const v=answers[q.id]; if(v==null) return;
    const n=((v-1)/4)*100;
    b[q.dim].push(n);
    b[q.pbe==='s'?'s':'e'].push(n);
  });
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
  const BA=avg(b.BA),BD=avg(b.BD),BR=avg(b.BR),BI=avg(b.BI);
  const sPBE=avg(b.s),ePBE=avg(b.e);
  const PBEw=BA*0.45+BD*0.35+BR*0.20;
  const tb=0.781+0.376+0.347;
  const PBEr=BA*(0.781/tb)+BD*(0.376/tb)+BR*(0.347/tb);
  const key=(BA>=60?'H':'L')+(BD>=60?'H':'L')+(BR>=60?'H':'L');
  return {BA,BD,BR,BI,sPBE,ePBE,PBEw,PBEr,key};
}

function enrichScore(base, prof) {
  let {BA,BD,BR}={...base};
  const lc=parseInt(prof.linkedinConn)||0;
  const le=parseInt(prof.linkedinEndorse)||0;
  const lr=parseInt(prof.linkedinRecs)||0;
  const tf=parseInt(prof.twitterFollowers)||0;
  const fb=parseInt(prof.fbFollowers)||0;
  const ig=parseInt(prof.igFollowers)||0;
  const yt=parseInt(prof.ytFollowers)||0;
  const tt=parseInt(prof.ttFollowers)||0;
  const pubs=parseInt(prof.pubs)||0;
  const conf=parseInt(prof.conferences)||0;
  const hi=parseInt(prof.hindex)||0;
  let adj={BA:0,BD:0,BR:0};
  if(le>10){BD=Math.min(100,BD*1.05);adj.BD+=5;}
  if(lr>3){BA=Math.min(100,BA*1.05);adj.BA+=5;}
  if(lc>500){BR=Math.min(100,BR*1.05);adj.BR+=5;}
  if(tf>1000){BR=Math.min(100,BR*1.10);adj.BR+=10;}
  if(fb>500){const b=Math.min(fb>5000?8:5,8);BR=Math.min(100,BR*(1+b/100));adj.BR+=b;}
  if(ig>1000){const b=Math.min(ig>10000?15:10,15);BR=Math.min(100,BR*(1+b/100));adj.BR+=b;}
  if(yt>500){const b=Math.min(yt>5000?12:7,12);BR=Math.min(100,BR*(1+b/100));adj.BR+=b;}
  if(tt>1000){const b=Math.min(tt>10000?12:7,12);BR=Math.min(100,BR*(1+b/100));adj.BR+=b;}
  if(pubs>=5){BD=Math.min(100,BD*1.10);adj.BD+=10;}
  if(conf>0){const b2=Math.min(conf*2,10);BR=Math.min(100,BR+b2);adj.BR+=b2;}
  if(hi>5){BD=Math.min(100,BD*1.15);adj.BD+=15;}
  // Web presence boosts (from Google/Bing name search)
  const wb_ba=parseInt(prof._webBoostBA)||0;
  const wb_bd=parseInt(prof._webBoostBD)||0;
  const wb_br=parseInt(prof._webBoostBR)||0;
  if(wb_ba>0){BA=Math.min(100,BA*(1+wb_ba/100));adj.BA+=wb_ba;}
  if(wb_bd>0){BD=Math.min(100,BD*(1+wb_bd/100));adj.BD+=wb_bd;}
  if(wb_br>0){BR=Math.min(100,BR*(1+wb_br/100));adj.BR+=wb_br;}
  const PBEw=BA*0.45+BD*0.35+BR*0.20;
  const tb2=0.781+0.376+0.347;
  const PBEr=BA*(0.781/tb2)+BD*(0.376/tb2)+BR*(0.347/tb2);
  const key=(BA>=60?'H':'L')+(BD>=60?'H':'L')+(BR>=60?'H':'L');
  return {...base,BA,BD,BR,PBEw,PBEr,key,enrichAdj:adj};
}

function ProfileScreen({profile,setProfile,onContinue,onSkip,peerMode,peerFor}) {
  const set=(k,v)=>setProfile(p=>({...p,[k]:v}));
  const [showSocial,setShowSocial]=useState(false);
  const [showAcad,setShowAcad]=useState(false);
  const [showMetrics,setShowMetrics]=useState(false);
  const [scanning,setScanning]=useState({}); // {fieldKey: 'scanning'|'done'|null}
  const [scanResults,setScanResults]=useState({});
  const [webPresence,setWebPresence]=useState(null);
  const [webPresenceLoading,setWebPresenceLoading]=useState(false);

  // Auto-trigger Google/Bing web presence scan when name + industry are both filled
  useEffect(()=>{
    const name=(profile.name||'').trim();
    const industry=(profile.industry||'').trim();
    if(!name||name.length<3) return;
    const timer=setTimeout(()=>{
      setWebPresenceLoading(true);
      fetch(`/api/google-presence?name=${encodeURIComponent(name)}&industry=${encodeURIComponent(industry)}`)
        .then(r=>r.json())
        .then(result=>{
          setWebPresenceLoading(false);
          if(result.success){
            setWebPresence(result);
            // Store boosts on profile so enrichScore can apply them
            if(result.data?.scoringBoosts){
              setProfile(p=>({...p,_webBoostBA:result.data.scoringBoosts.BA||0,
                _webBoostBD:result.data.scoringBoosts.BD||0,
                _webBoostBR:result.data.scoringBoosts.BR||0}));
            }
          }
        })
        .catch(()=>setWebPresenceLoading(false));
    },1800); // debounce — wait 1.8s after last name/industry change
    return ()=>clearTimeout(timer);
  },[profile.name, profile.industry]);

  // Real social profile analysis — calls Vercel serverless scrapers
  // Where no API exists (FB/IG/TikTok), shows direct deep-link to find the count manually
  const MANUAL_ENTRY_PLATFORMS={
    'Facebook':{
      metricKey:'fbFollowers',
      howToFind:'Open your Facebook profile → tap "Friends" or check your Page for follower count',
      deepLink: val=>`https://www.facebook.com/${(val.split('facebook.com/')[1]||'').split('?')[0]}`,
    },
    'Instagram':{
      metricKey:'igFollowers',
      howToFind:'Open Instagram → your profile → number under "Followers"',
      deepLink: val=>`https://www.instagram.com/${(val.split('instagram.com/')[1]||'').split('?')[0].replace(/^\//,'')}`,
    },
    'TikTok':{
      metricKey:'ttFollowers',
      howToFind:'Open TikTok → your profile → "Followers" count shown under your name',
      deepLink: val=>`https://www.tiktok.com/@${(val.split('@')[1]||'').split('?')[0]}`,
    },
    'Twitter/X':{
      metricKey:'twitterFollowers',
      howToFind:'Open Twitter/X → your profile → "Followers" shown on profile page',
      deepLink: val=>`https://x.com/${(val.split('twitter.com/')[1]||val.split('x.com/')[1]||'').split('?')[0]}`,
    },
  };

  const handleSocialBlur=(key,val)=>{
    if(!val||val.length<8) return;
    const url=val.toLowerCase();

    // Determine which scraper endpoint to call
    let apiEndpoint=null;
    let platform=null;
    if(url.includes('linkedin.com'))                         { apiEndpoint='/api/scrape-linkedin';     platform='LinkedIn'; }
    else if(url.includes('twitter.com')||url.includes('x.com')) { platform='Twitter/X'; }
    else if(url.includes('researchgate.net'))                { apiEndpoint='/api/scrape-researchgate'; platform='ResearchGate'; }
    else if(url.includes('scholar.google'))                  { apiEndpoint='/api/scrape-scholar';      platform='Google Scholar'; }
    else if(url.includes('orcid.org'))                       { apiEndpoint='/api/scrape-orcid';        platform='ORCID'; }
    else if(url.includes('github.com'))                      { apiEndpoint='/api/scrape-github';       platform='GitHub'; }
    else if(url.includes('youtube.com'))                     { apiEndpoint='/api/scrape-youtube';      platform='YouTube'; }
    else if(url.includes('facebook.com'))                    { platform='Facebook'; }
    else if(url.includes('instagram.com'))                   { platform='Instagram'; }
    else if(url.includes('tiktok.com'))                      { platform='TikTok'; }
    if(!platform) return;

    setScanning(p=>({...p,[key]:'scanning'}));

    // ── Platforms with no usable free API → manual entry guidance ─────────
    if(!apiEndpoint && MANUAL_ENTRY_PLATFORMS[platform]){
      const {metricKey,howToFind,deepLink}=MANUAL_ENTRY_PLATFORMS[platform];
      setTimeout(()=>{
        setScanning(p=>({...p,[key]:'done'}));
        setScanResults(p=>({...p,[key]:{
          platform,
          manual:true,
          metricKey,
          howToFind,
          profileUrl: deepLink(val),
          signals:[`${platform} URL saved — enter your follower count in the field below`],
        }}));
      },400);
      return;
    }

    // ── Call real scraper API ─────────────────────────────────────────────
    fetch(`${apiEndpoint}?url=${encodeURIComponent(val)}`)
      .then(r=>r.json())
      .then(result=>{
        setScanning(p=>({...p,[key]:'done'}));
        if(result.success){
          setScanResults(p=>({...p,[key]:{platform:result.platform,signals:result.signals||[]}}));
          // ── Auto-populate metric fields from scraped data ──────────────
          const d=result.data||{};
          if(platform==='LinkedIn'){
            if(d.connections &&!profile.linkedinConn)    set('linkedinConn',    String(d.connections));
            if(d.endorsements&&!profile.linkedinEndorse) set('linkedinEndorse', String(d.endorsements));
            if(d.recommendations&&!profile.linkedinRecs) set('linkedinRecs',    String(d.recommendations));
          }
          if(platform==='YouTube'){
            if(d.subscribers!=null&&!profile.ytFollowers) set('ytFollowers', String(d.subscribers));
          }
          if(platform==='ResearchGate'){
            if(d.publications&&!profile.pubs)    set('pubs',   String(d.publications));
            if(d.hIndex      &&!profile.hindex)  set('hindex', String(d.hIndex));
          }
          if(platform==='Google Scholar'){
            if(d.paperCount  &&!profile.pubs)    set('pubs',   String(d.paperCount));
            if(d.hIndex      &&!profile.hindex)  set('hindex', String(d.hIndex));
          }
          if(platform==='ORCID'){
            if(d.worksCount&&!profile.pubs) set('pubs', String(d.worksCount));
          }
        } else {
          const msg = result.requiresLogin
            ? `Login required — set your ${platform} profile to Public`
            : result.blocked
            ? `${platform} access blocked (try again later)`
            : (result.signals?.[0] || `${platform} URL detected`);
          setScanResults(p=>({...p,[key]:{platform,signals:[msg]}}));
        }
      })
      .catch(()=>{
        setScanning(p=>({...p,[key]:'done'}));
        setScanResults(p=>({...p,[key]:{platform,signals:[`${platform} URL detected (could not reach server)`]}}));
      });
  };

      gap:8,background:'none',border:'none',cursor:'pointer',padding:0,textAlign:'left',marginBottom:open?4:0}}

      <span style={{fontSize:18,color:'var(--text3)',transition:'transform .2s',
        transform:open?'rotate(180deg)':'none',display:'inline-block'}}>⌄</span>
    </button>

      <div style={{maxWidth:620,margin:'0 auto'}}>
        <div className="chip fu" style={{background:'var(--surface)',border:'1.5px solid var(--border)',
          color:'var(--text2)',marginBottom:20}}>

        </div>
        <h2 className="headline fu" style={{marginBottom:8,animationDelay:'.05s'}}>

        <div className="card-lg fu" style={{animationDelay:'.14s',marginBottom:20}}>

// ── QUESTIONNAIRE ─────────────────────────────────────────────────────────────
const SS_KEY='pbe_progress'; // sessionStorage key for autosave

function QuestionnaireScreen({answers,onAnswer,onFinish,peerMode,peerFor}) {
  const mainQs=QS.filter(q=>q.dim!=='BI');
  const biQs=QS.filter(q=>q.dim==='BI');
  const allQs=[...mainQs,...biQs];
  const total=allQs.length;

  // Restore idx from sessionStorage on mount (so tab close/refresh doesn't lose progress)
  const [idx,setIdx]=useState(()=>{
    if(peerMode) return 0; // don't restore peer sessions
    try{
      const saved=JSON.parse(sessionStorage.getItem(SS_KEY)||'{}');
      return Math.min(saved.idx||0, total-1);
    }catch{return 0;}
  });

  const [justSelected,setJustSelected]=useState(false);
  const timerRef=useRef(null);
  const q=allQs[idx];
  const val=answers[q?.id];
  const pct=(Object.keys(answers).length/total)*100;
  const c=DC[q?.dim]||DC.BA;
  const LBLS=['Strongly disagree','Disagree','Neutral','Agree','Strongly agree'];
  const EMOJIS=['😞','🙁','😐','🙂','😊'];
  const peerText=peerFor||'your colleague';

  // Autosave idx + answers to sessionStorage on every change
  useEffect(()=>{
    if(peerMode) return;
    try{sessionStorage.setItem(SS_KEY,JSON.stringify({idx,answers}));}catch{}
  },[idx,answers,peerMode]);

  const advanceNow=()=>{if(idx<total-1)setIdx(i=>i+1);else{
    // Clear saved progress on completion
    try{sessionStorage.removeItem(SS_KEY);}catch{}
    onFinish();
  }};

  const handleSelect=(id,value)=>{
    onAnswer(id,value);
    setJustSelected(true);
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{
      setJustSelected(false);
      advanceNow();
    },420);
  };

  // Reset justSelected when idx changes (navigated back/forward)
  useEffect(()=>{setJustSelected(false);if(timerRef.current)clearTimeout(timerRef.current);},[idx]);

  // Keyboard shortcuts: 1-5 to answer, Left/Right to navigate
  useEffect(()=>{
    const handler=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      const n=parseInt(e.key);
      if(n>=1&&n<=5&&q){handleSelect(q.id,n);return;}
      if(e.key==='ArrowLeft'&&idx>0){if(timerRef.current)clearTimeout(timerRef.current);setJustSelected(false);setIdx(i=>i-1);}
      if(e.key==='ArrowRight'&&val){if(timerRef.current)clearTimeout(timerRef.current);setJustSelected(false);advanceNow();}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[idx,q,val]);

  const dp={};
  ['BA','BD','BR','BI'].forEach(d=>{
    const qs=allQs.filter(x=>x.dim===d);
    dp[d]={done:qs.filter(x=>answers[x.id]).length,total:qs.length};
  });

  const qText=peerMode
    ?q?.t.replace(/^I /,`${peerText} `).replace(/\bmy\b/g,'their').replace(/\bme\b/g,'them')
    :q?.t;

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:'20px 16px 80px'}}>
      {peerMode&&(
        <div className="toast toast--info" style={{maxWidth:680,margin:'0 auto 12px',fontWeight:500}}>
          Peer Rating Mode — you are rating <strong>{peerText}</strong>
        </div>
      )}
      <div style={{maxWidth:680,margin:'0 auto 14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span className="label">{DL[q?.dim]}</span>
          <span style={{fontSize:13,fontWeight:500,color:'var(--text3)'}}>{Math.round(pct)}%</span>
        </div>
        <div className="prog"><div className="prog-fill" style={{width:`${pct}%`,background:c}}/></div>
      </div>

      <div style={{maxWidth:680,margin:'0 auto 18px',display:'flex',gap:7}}>
        {['BA','BD','BR','BI'].map(d=>{
          const isNow=q?.dim===d,cc=DC[d];
          return(
            <div key={d} style={{flex:1,borderRadius:10,padding:'7px 4px',textAlign:'center',
              background:isNow?cc+'16':'var(--surface)',border:`1.5px solid ${isNow?cc:'var(--border)'}`,
              transition:'all .2s'}}>
              <div style={{fontSize:10.5,fontWeight:700,color:isNow?cc:'var(--text3)'}}>{d}</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{dp[d].done}/{dp[d].total}</div>
            </div>
          );
        })}
      </div>

      <div className="card-lg fi" key={q?.id} style={{maxWidth:680,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span className="chip" style={{background:c+'18',color:c}}>{q?.v}</span>
          <span style={{fontSize:13,color:'var(--text3)',fontWeight:500}}>{idx+1} / {total}</span>
        </div>
        <div className="label" style={{marginBottom:5,color:'var(--text3)'}}>
          {q?.pbe==='e'?'External perception':'Self assessment'} · {DL[q?.dim]}
        </div>
        <h2 className="title" style={{marginBottom:24,fontSize:18,lineHeight:1.4}}>{qText}</h2>
        <div role="radiogroup" aria-label={`Rate: ${qText}`} style={{display:'flex',gap:0,marginBottom:4}}>
          {LBLS.map((l,i)=>{
            const on=val===i+1;
            return(
              <button key={i} role="radio" aria-checked={on} className={`qbtn${on?' on':''}`}
                style={on?{background:c,boxShadow:`0 4px 14px ${c}40`}:{}}
                onClick={()=>handleSelect(q.id,i+1)}>
                <div style={{fontSize:18,marginBottom:4}} aria-hidden="true">{EMOJIS[i]}</div>
                {l}
              </button>
            );
          })}
        </div>
        {justSelected&&val
          ?<div role="status" aria-live="polite" style={{textAlign:'center',color:c,fontSize:13,marginTop:8,fontWeight:500,
              animation:'fadeIn .2s ease'}}>
              ✓ Continuing in a moment…
            </div>
          :!val&&<div style={{textAlign:'center',color:'var(--text3)',fontSize:13,marginTop:8}}>
              Press <strong>1–5</strong> to answer · <strong>← →</strong> to navigate
            </div>
        }
      </div>

      <div style={{maxWidth:680,margin:'14px auto 0',display:'flex',justifyContent:'space-between',gap:8}}>
        <button className="btn btn-s" onClick={()=>{if(timerRef.current)clearTimeout(timerRef.current);setJustSelected(false);if(idx>0)setIdx(idx-1);}} disabled={idx===0}>← Back</button>
        <button className="btn btn-p" onClick={()=>{if(timerRef.current)clearTimeout(timerRef.current);setJustSelected(false);advanceNow();}} disabled={!val}>
          {idx===total-1?'See Results →':'Next →'}
        </button>
      </div>
    </div>

// ── PBE FRAMEWORK ─────────────────────────────────────────────────────────────
function Figure14({scores}) {

  function waterFill(cx,cy,rx,ry,score,color) {
    const fillY=cy-ry+(ry*2*(1-score/100));
    const threshY=cy-ry+(ry*2*0.4);
    const xAtFill=fill=>{const dy=(fill-cy)/ry;return dy*dy<1?Math.sqrt(1-dy*dy)*rx:0;};
    const xT=xAtFill(threshY);
    const isH=score>=60;
    return(
      <g>
        <defs>
          <clipPath id={`clip${color.replace('#','')}`}>
            <ellipse cx={cx} cy={cy} rx={rx-1} ry={ry-1}/>
          </clipPath>
        </defs>
        <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={color+'0A'}/>
        <rect x={cx-rx} y={fillY} width={rx*2} height={(cy+ry)-fillY}
          fill={color} opacity={0.72} clipPath={`url(#clip${color.replace('#','')})`}/>
        <line x1={cx-xT} y1={threshY} x2={cx+xT} y2={threshY}
          stroke="#fff" strokeWidth={1.5} strokeDasharray="4,3" opacity={.7}/>

    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);

// ── CAUSALITY PATH ────────────────────────────────────────────────────────────
function CausalityPath({scores}) {
  const {BA,BD,BR}=scores;
  const TW=560,TH=300,eRx=68,eRy=38;

  // Shared arrow component for triangles
  function TriArr({x1,y1,x2,y2,beta,color,dashed,labelSide='center',lox=0,loy=0}) {
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/len,uy=dy/len;
    const sx=x1+ux*eRx*0.9,sy=y1+uy*eRy*0.9;
    const ex=x2-ux*eRx*0.9,ey=y2-uy*eRy*0.9;
    const axe=ex-ux*8,aye=ey-uy*8;
    const mx=(sx+ex)/2+lox,my=(sy+ey)/2+loy;
    const w=dashed?1.2:1.5+parseFloat(beta)*3.5;
    const op=dashed?0.45:0.85;
    const clr=color||'#666';
    return(<g>
      <line x1={sx} y1={sy} x2={axe} y2={aye} stroke={clr} strokeWidth={w} opacity={op}
        strokeDasharray={dashed?'5,4':undefined}/>
      <polygon points={`${ex},${ey} ${axe-uy*3.5},${aye+ux*3.5} ${axe+uy*3.5},${aye-ux*3.5}`}
        fill={clr} opacity={op}/>
      <rect x={mx-22} y={my-10} width={44} height={20} rx={10} fill="#fff" opacity={.96}
        stroke={clr} strokeWidth={.6} strokeOpacity={.4}/>
      <text x={mx} y={my+4} textAnchor="middle" fontSize={9.5} fontWeight={700}
        fill={clr} fontFamily="DM Sans,system-ui">β={beta}</text>
    </g>);
  }

  function TriNode({x,y,label,s,color,r2}) {
    const isH=s>=60;
    return(<g>
      <ellipse cx={x} cy={y} rx={eRx} ry={eRy} fill={color+'18'}
        stroke={color} strokeWidth={isH?2.5:1.5}/>
      {r2!==undefined&&(
        <text x={x} y={y-eRy-8} textAnchor="middle" fontSize={9} fontWeight={600}
          fill={color} fontFamily="DM Sans,system-ui" opacity={.8}>R²={r2}</text>
      )}
      <text x={x} y={y-9} textAnchor="middle" fontSize={9.5} fontWeight={700}
        fill={color} fontFamily="Bricolage Grotesque,system-ui">{label}</text>
      <text x={x} y={y+8} textAnchor="middle" fontSize={14} fontWeight={800}
        fill={color} fontFamily="DM Sans,system-ui">{Math.round(s)}%</text>
      <rect x={x-16} y={y+14} width={32} height={14} rx={7} fill={color} opacity={.15}/>
      <text x={x} y={y+24} textAnchor="middle" fontSize={8} fontWeight={800}
        fill={color}>{isH?'HIGH':'LOW'}</text>
    </g>);
  }

  // Figure 11 positions: BA top-left, BD bottom-center, BR top-right
  const f11={BA:{x:100,y:80},BD:{x:280,y:240},BR:{x:460,y:80}};
  // Figure 12 positions: BA top-left, BR bottom-center, BD top-right
  const f12={BA:{x:100,y:80},BR:{x:280,y:240},BD:{x:460,y:80}};
  // Figure 13 positions: BD top-left, BR bottom-center, BA top-right
  const f13={BD:{x:100,y:80},BR:{x:280,y:240},BA:{x:460,y:80}};

  const triModels=[
    {
      id:'f11',
      title:'Model 1 — BA as primary predictor of BD and BR',
      ref:'Dissertation Figure 11 (Section 5.2.11.1, p.100)',
      desc:'Brand Appeal is the primary independent variable. It directly predicts both Brand Differentiation (dominant path, β=0.781) and Brand Recognition (β=0.376). Brand Differentiation also directly predicts Recognition (β=0.347). BD R²=61.0%, BR R²=46.5%.',
      nodes:[
        {key:'BA',label:'Brand Appeal',s:BA,color:DC.BA,pos:f11.BA},
        {key:'BD',label:'Brand Diff.',s:BD,color:DC.BD,pos:f11.BD,r2:'61.0%'},
        {key:'BR',label:'Brand Recog.',s:BR,color:DC.BR,pos:f11.BR,r2:'46.5%'},
      ],
      arrows:[
        {x1:f11.BA.x,y1:f11.BA.y,x2:f11.BD.x,y2:f11.BD.y,beta:'0.781',color:DC.BA,dashed:false,lox:-18,loy:0},
        {x1:f11.BA.x,y1:f11.BA.y,x2:f11.BR.x,y2:f11.BR.y,beta:'0.376',color:'#888',dashed:true,lox:0,loy:-14},
        {x1:f11.BD.x,y1:f11.BD.y,x2:f11.BR.x,y2:f11.BR.y,beta:'0.347',color:DC.BD,dashed:true,lox:18,loy:0},
      ],
    },
    {

      title:'Model 2 — BA as primary predictor of BR and BD',
      ref:'Dissertation Figure 12 (Section 5.2.11.2, p.102)',
      desc:'Brand Appeal again acts as the independent variable, but here it primarily predicts Brand Recognition (β=0.649, solid). BA also influences BD (β=0.631, dashed). Brand Recognition then feeds back into Differentiation (β=0.232). BD R²=64.2%, BR R²=41.9%.',
      nodes:[

      nodes:[
        {key:'BD',label:'Brand Diff.',s:BD,color:DC.BD,pos:f13.BD},
        {key:'BR',label:'Brand Recog.',s:BR,color:DC.BR,pos:f13.BR,r2:'41.0%'},

      ],
      arrows:[
        {x1:f13.BD.x,y1:f13.BD.y,x2:f13.BR.x,y2:f13.BR.y,beta:'0.641',color:DC.BD,dashed:false,lox:-18,loy:0},
        {x1:f13.BD.x,y1:f13.BD.y,x2:f13.BA.x,y2:f13.BA.y,beta:'0.622',color:'#888',dashed:true,lox:0,loy:-14},

  return(

        <br/><br/>
        <strong>How to read the triangles:</strong> In each triangle, the dimension at the <em>top corners</em> serves as either predictor or outcome, while the dimension at the <em>bottom center</em> receives the primary causal path. <strong>Solid arrows</strong> show the primary (strongest) causal relationship in that model. <strong>Dashed arrows</strong> show secondary paths. The <strong>β value</strong> on each arrow is the standardized regression coefficient (effect size) — higher means a stronger causal link. <strong>R²</strong> shows how much variance in the outcome variable is explained. All coefficients are significant at <em>p&lt;.001</em>.
        <br/><br/>
        <strong>Key finding across all models:</strong> Brand Appeal (BA) is the most consistent and powerful predictor regardless of model specification, with path coefficients ranging from β=0.376 to β=0.781. This means investing in your professional image, likability, and impresson management produces the strongest compounding effects on differentiation and recognition.

          <svg width="32" height="10"><line x1="2" y1="5" x2="24" y2="5" stroke="#888" strokeWidth="1.2" strokeDasharray="4,3"/><polygon points="30,5 22,2 22,8" fill="#888" opacity=".5"/></svg>
          Dashed = secondary path
        </span>
      </div>

      {triModels.map((tm,ti)=>(
        <div key={tm.id} style={{marginTop:24,borderTop:ti===0?'none':'1.5px solid var(--border)',paddingTop:ti===0?0:24}}>
          <div style={{marginBottom:4}}>

              background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)',marginBottom:10}}>

          <div style={{overflowX:'auto'}}>

                  <stop offset="0%" stopColor="#F5F6FB"/><stop offset="100%" stopColor="#ECEEF5"/>
