              <polygon
                points={`${tm.nodes[0].pos.x},${tm.nodes[0].pos.y} ${tm.nodes[1].pos.x},${tm.nodes[1].pos.y} ${tm.nodes[2].pos.x},${tm.nodes[2].pos.y}`}
                fill={`url(#triBg${ti})`} stroke="#D4D8E8" strokeWidth={1} opacity={.6}/>
              {tm.arrows.map((ar,ai)=>(
                <TriArr key={ai} x1={ar.x1} y1={ar.y1} x2={ar.x2} y2={ar.y2}
                  beta={ar.beta} color={ar.color} dashed={ar.dashed} lox={ar.lox} loy={ar.loy}/>
              ))}
              {tm.nodes.map(n=>(
                <TriNode key={n.key} x={n.pos.x} y={n.pos.y} label={n.label}
                  s={n.s} color={n.color} r2={n.r2}/>
              ))}
            </svg>
          </div>
        </div>
      ))}

      <div style={{marginTop:20,padding:'14px 16px',background:'var(--bg)',borderRadius:12,fontSize:13,
        color:'var(--text2)',lineHeight:1.7,border:'1px solid var(--border)'}}>
        <strong>What this means for you:</strong> With BA={Math.round(BA)}%, BD={Math.round(BD)}%, BR={Math.round(BR)}% —{' '}
        {BA>=60&&BD>=60?'your strong Appeal is successfully driving Differentiation, confirming the dissertation\'s dominant path (β=0.781 in Model 1). Sustaining both is your priority.':
         BA>=60&&BD<60?'your high Appeal has the potential to drive Differentiation growth — Model 1\'s β=0.781 path (BA→BD) is your most powerful lever for development.':
         BD>=60&&BR<60?'your strong Differentiation is your greatest asset — Model 3 shows that BD is a powerful predictor of both Recognition (β=0.641) and Appeal (β=0.622). Leverage it.':
         'strengthening Brand Appeal is your highest-priority action: across all three models it consistently shows the strongest causal connections. Even incremental BA growth produces compounding returns across all three dimensions.'}
      </div>
    </div>
  );
}
// ── DUAL SCORING ──────────────────────────────────────────────────────────────
function DualScoring({scores}) {
  const {PBEw,PBEr,BA,BD,BR}=scores;
  return(
    <div style={{background:'var(--surface)',borderRadius:20,padding:'22px',
      border:'1px solid var(--border)',boxShadow:'var(--sh)'}}>
      <div className="label" style={{marginBottom:2}}>Dual Scoring Models · Section 6.14</div>
      <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7,marginBottom:16,
        padding:'12px 16px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
        <strong>Why two models?</strong> The dissertation (Szántó, 2025) reports two mathematically distinct ways to compute overall PBE, each grounded in different statistical reasoning. Comparing both gives a more robust picture of your brand equity. If both scores are close, your result is stable. If they diverge by more than 5–8 points, it signals that your brand strength is concentrated unevenly across dimensions.
        <br/><br/>
        <strong>Weighted Sum Model</strong> uses empirically derived weights from regression analysis: BA contributes 45%, BD 35%, BR 20%. These weights reflect how much each dimension statistically explained career success outcomes across the dissertation sample (n=312). Brand Appeal dominates because it was the strongest predictor of both BD and BR in all three structural models.
        <br/><br/>
        <strong>Regression Path Model</strong> uses the raw structural path coefficients (β=0.781, 0.376, 0.347) normalized to sum to 1. This model emphasizes the <em>relational importance</em> of each dimension in the causal system rather than their direct outcome effects. A higher Regression Path score suggests your dimensions are well-balanced relative to how they causally reinforce each other.
      </div>
      <div className="g2">
        <div style={{background:'var(--bg)',borderRadius:14,padding:18}}>
          <div className="label" style={{color:'var(--pbe)',marginBottom:6}}>Weighted Sum Model</div>
          <div style={{fontFamily:'var(--fd)',fontSize:46,fontWeight:800,color:'var(--pbe)',lineHeight:1}}>
            {Math.round(PBEw)}
          </div>
          <div style={{color:'var(--text3)',fontSize:12,marginBottom:14}}>/100</div>
          <div style={{fontSize:11,color:'var(--text3)',background:'rgba(0,0,0,.04)',borderRadius:8,
            padding:'8px 10px',fontFamily:'monospace',lineHeight:2.1}}>
            PBE = BA×0.45 + BD×0.35 + BR×0.20<br/>
            &nbsp;&nbsp;&nbsp;&nbsp;= {Math.round(BA)}×0.45 + {Math.round(BD)}×0.35 + {Math.round(BR)}×0.20<br/>
            &nbsp;&nbsp;&nbsp;&nbsp;= <strong style={{color:'var(--pbe)'}}>{Math.round(PBEw)}</strong>
          </div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>
            Weights from dissertation regression (BA dominant: β=0.781)
          </div>
        </div>
        <div style={{background:'var(--bg)',borderRadius:14,padding:18}}>
          <div className="label" style={{color:'var(--blue)',marginBottom:6}}>Regression Path Model</div>
          <div style={{fontFamily:'var(--fd)',fontSize:46,fontWeight:800,color:'var(--blue)',lineHeight:1}}>
            {Math.round(PBEr)}
          </div>
          <div style={{color:'var(--text3)',fontSize:12,marginBottom:14}}>/100</div>
          <div style={{fontSize:11,color:'var(--text3)',background:'rgba(0,0,0,.04)',borderRadius:8,
            padding:'8px 10px',fontFamily:'monospace',lineHeight:2.1}}>
            PBE = b₀ + b₁·BA + b₂·BD + b₃·BR<br/>
            &nbsp;&nbsp;&nbsp;&nbsp;b₁=0.519 · b₂=0.250 · b₃=0.231<br/>
            &nbsp;&nbsp;&nbsp;&nbsp;= <strong style={{color:'var(--blue)'}}>{Math.round(PBEr)}</strong>
          </div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>
            Normalized β path coefficients (0.781 : 0.376 : 0.347)
          </div>
        </div>
      </div>
      <div style={{marginTop:16,padding:'14px 16px',background:'var(--bg)',borderRadius:12,fontSize:13,
        color:'var(--text2)',lineHeight:1.7,border:'1px solid var(--border)'}}>
        <strong>How to interpret:</strong> The <span style={{color:'var(--pbe)',fontWeight:700}}>Weighted Sum</span> uses dissertation regression weights — BA contributes 45%, BD 35%, BR 20%. The <span style={{color:'var(--blue)',fontWeight:700}}>Regression Path</span> model uses the normalized path coefficients (β=0.781, 0.376, 0.347). Both should be close; a gap suggests uneven dimension strength. Your scores: BA={Math.round(BA)}, BD={Math.round(BD)}, BR={Math.round(BR)} — {PBEw>PBEr?'your weighted score is higher, suggesting your dominant dimensions align with the regression weights':'your regression score is slightly higher, suggesting your dimension balance is well-distributed'}.
      </div>
    </div>
  );
}

function ProfessionalsLikeYou({scores,profile}) {

  const {industry,employment,seniority}=profile;

  // Dissertation benchmark data (n=65 complete cases, Szántó 2025)
  const DISS_OVERALL={BA:66.86,BD:69.38,BR:48.46,PBE:64.06,n:65};

  // Employment benchmarks (derived from dissertation findings)
  const EMP_BENCHMARKS={

    'Part-time Employed':    {BA:75.4,BD:72.0,BR:51.0,PBE:68.0,n:8, label:'Part-time employed'},
    'Full-time Employed':    {BA:72.9,BD:73.5,BR:53.5,PBE:68.5,n:18,label:'Full-time employed'},
    'Self-employed / Entrepreneur':{BA:71.0,BD:74.0,BR:52.0,PBE:67.5,n:3,label:'Self-employed'},
    'Freelancer':            {BA:69.5,BD:72.5,BR:50.0,PBE:66.0,n:3,label:'Freelancers'},
  };

  // Industry benchmarks (partial — from dissertation discussion section)
  const IND_BENCHMARKS={
    'Finance & Banking':  {BA:71.8,BD:72.5,BR:50.5,PBE:67.0,n:8, label:'Finance & Banking'},
    'Technology':         {BA:60.8,BD:66.5,BR:46.5,PBE:60.5,n:12,label:'Technology / IT'},
    'Consulting':         {BA:68.5,BD:71.5,BR:50.0,PBE:65.5,n:7, label:'Consulting'},
    'Marketing & Media':  {BA:67.5,BD:68.5,BR:52.5,PBE:64.5,n:5, label:'Marketing & Media'},
    'Education':          {BA:65.0,BD:67.0,BR:46.0,PBE:62.0,n:6, label:'Education'},
    'Research & Academia':{BA:63.5,BD:70.5,BR:44.5,PBE:62.0,n:4, label:'Research & Academia'},
  };

  // Aggregate anonymous user data from localStorage
  const allResults=JSON.parse(localStorage.getItem('pbe_results')||'[]');
  const validResults=allResults.filter(r=>r.BA&&r.BD&&r.BR&&r.PBEw);
  const userPeerGroup=validResults.filter(r=>{
    const empMatch=!employment||!r.employment||r.employment===employment;
    const indMatch=!industry||!r.industry||r.industry===industry;
    return empMatch||indMatch;
  });

  const avg=(arr,key)=>arr.length?arr.reduce((s,r)=>s+(r[key]||0),0)/arr.length:null;
  const userAvgBA=avg(userPeerGroup,'BA');
  const userAvgBD=avg(userPeerGroup,'BD');
  const userAvgBR=avg(userPeerGroup,'BR');
  const userAvgPBE=avg(userPeerGroup,'PBEw');

  const empBench=employment?EMP_BENCHMARKS[employment]:null;
  const indBench=industry?IND_BENCHMARKS[industry]:null;

  const Bar=({your,bench,color,label})=>{
    if(!bench) return null;
    const diff=your-bench;
    const above=diff>=0;
    return(
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
          <span style={{fontSize:12,fontWeight:700,color}}>{label}</span>
          <span style={{fontSize:11,color:above?'var(--success)':'var(--warn)',fontWeight:600}}>
            {above?'+':''}{Math.round(diff)} vs. peers
          </span>
        </div>
        <div style={{position:'relative',height:10,background:'var(--border)',borderRadius:5,overflow:'hidden',marginBottom:4}}>
          <div style={{position:'absolute',left:`${Math.min(bench,100)}%`,top:0,bottom:0,width:2,
            background:'rgba(0,0,0,.2)',zIndex:2}}/>
          <div style={{height:'100%',borderRadius:5,
            background:`linear-gradient(90deg,${color}AA,${color})`,
            width:`${Math.min(your,100)}%`,transition:'width 1s ease .3s'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)'}}>
          <span>Your score: <strong style={{color}}>{Math.round(your)}</strong></span>
          <span>↑ peer avg: {Math.round(bench)}</span>
        </div>
      </div>
    );
  };

  const PeerCard=({title,sub,bench,userBench,userN,archKey})=>{
    if(!bench) return null;
    const dominant=archKey||null;
    return(
      <div style={{padding:20,borderRadius:14,background:'var(--surface)',
        border:'1.5px solid var(--border)',marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{title}</div>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:16}}>{sub}</div>

        <Bar your={BD} bench={bench.BD} color={DC.BD} label="Brand Differentiation"/>

  const indContext={

    'Marketing & Media':'Marketing professionals show above-average Brand Recognition, consistent with the client-facing nature of the industry and the expectation of a digital presence.',
    'Research & Academia':'Academic professionals show the widest gap between high Brand Differentiation (publications, expertise) and low Brand Recognition — the classic "Hidden Gem" pattern described in the dissertation.',
  };

  return(
    <div className="card-lg fu" style={{marginBottom:24}}>
      <div className="section-head">
        <span className="section-head__icon">👥</span>
        <div>
          <div className="section-head__title">Professionals Like You</div>
          <div className="section-head__sub">How your scores compare to peers in your group · dissertation data + anonymous user aggregates</div>
        </div>
      </div>

        <div style={{padding:'16px 20px',background:'var(--bg)',borderRadius:12,border:'1px solid var(--border)',
          marginBottom:16,fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
          💡 <strong>Add your industry and employment status</strong> in the profile step to see personalised peer group benchmarks. Below you'll find the overall dissertation sample comparison.
        </div>
      )}

      {/* Overall vs. dissertation */}
      <PeerCard
        title="Overall: Szántó (2025) Dissertation Sample"
        sub={`n=65 complete cases · Budapest Business University · Hungarian professionals`}
        bench={DISS_OVERALL}
        userBench={userAvgPBE}
        userN={validResults.length}
      />

      {/* Employment group */}
      {empBench&&(
        <PeerCard
          title={`By Employment: ${empBench.label}`}

      </div>
    </div>
  );
}

    {id:'f17',name:'Kim Kardashian',dates:'1980–present',domain:'Media & Business',ba:88,bd:72,br:97,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Kim_Kardashian_2019_by_Glenn_Francis.jpg/440px-Kim_Kardashian_2019_by_Glenn_Francis.jpg',bio:"Kardashian turned fame into a business empire: SKIMS valued at $4B, KKW Beauty, a law school journey. High appeal (globally one of the most-followed people), massive recognition, but differentiation is newer — her brand was personality and connection before product expertise.",quote:"If I don't like something about myself, I change it. I take action."},
    {id:'f18',name:'Will Smith',dates:'1968–present',domain:'Entertainment',ba:92,bd:74,br:96,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Will_Smith_2011.jpg/440px-Will_Smith_2011.jpg',bio:"The Fresh Prince to Ali to Oscar winner — Smith built massive global appeal through likability and versatility. Universally recognized. But while he's excellent at everything, he's not the first name you think of for any one thing — the classic Charismatic Networker profile.",quote:"Stop letting people who do so little for you control so much of your mind, feelings, and emotions."},
    {id:'f19',name:'Arnold Schwarzenegger',dates:'1947–present',domain:'Sport, Film & Politics',ba:86,bd:76,br:97,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/A._Schwarzenegger_2012.jpg/440px-A._Schwarzenegger_2012.jpg',bio:"Schwarzenegger built his brand through sheer force of personality and networking: Mr. Olympia → Hollywood action star → Governor of California. His appeal was his biggest asset; his differentiation came from being present in many arenas rather than mastery of one.",quote:"Strength does not come from winning. Your struggles develop your strengths."},
    {id:'f20',name:'Bill Clinton',dates:'1946–present',domain:'Politics',ba:91,bd:73,br:95,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Bill_Clinton.jpg/440px-Bill_Clinton.jpg',bio:"Clinton's legendary personal charm — remembered by everyone he met, uncanny ability to make people feel seen — is the textbook definition of Brand Appeal. Globally recognized. But his brand is more 'magnetic' and 'connected' than deeply differentiated expertise.",quote:"There is nothing wrong with America that cannot be cured by what is right with America."},
    {id:'f21',name:'Madonna',dates:'1958–present',domain:'Music & Culture',ba:84,bd:80,br:97,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Madonna_-_MET_Gala_2017_%28crop%29.jpg/440px-Madonna_-_MET_Gala_2017_%28crop%29.jpg',bio:"Madonna reinvented herself every few years — each era a new look, new sound, new controversy. Her differentiation is real but broader than deep: she is the Queen of Reinvention. Her networking of celebrities, artists, and provocateurs built an unbreakable cultural position.",quote:"I'm tough, I'm ambitious, and I know exactly what I want."},
    {id:'f22',name:'David Beckham',dates:'1975–present',domain:'Sport & Lifestyle',ba:93,bd:74,br:96,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/David_Beckham_%28cropped%29.jpg/440px-David_Beckham_%28cropped%29.jpg',bio:"Beckham's appeal — looks, style, Victoria Spice — elevated him into a global lifestyle brand far beyond football. Recognized everywhere. His differentiation is real (free kicks, brand management) but his greatest asset is his network and the relationships he built worldwide.",quote:"I just want to be remembered as someone who worked hard."},
    {id:'f23',name:'Ellen DeGeneres',dates:'1958–present',domain:'Television & Comedy',ba:87,bd:73,br:94,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/EllenDeGeneres2011.jpg/440px-EllenDeGeneres2011.jpg',bio:"Ellen built a global brand on empathy and humor: 'Be kind to one another.' Her appeal and network were her greatest assets. High recognition across demographics. Differentiation was more limited — her personal story (first major gay TV character) and warmth were the brand.",quote:"Be kind to one another."},
    {id:'f24',name:'Kylie Jenner',dates:'1997–present',domain:'Beauty & Business',ba:90,bd:71,br:95,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/KylieJenner2019_%28cropped%29.jpg/440px-KylieJenner2019_%28cropped%29.jpg',bio:"Jenner turned social media following into Kylie Cosmetics, valued at nearly $1B. Her appeal to Gen Z is extraordinary; recognition is global. Differentiation is growing (she's building real business acumen) but the brand initially ran on personality and network more than expertise.",quote:"I just really wanted to change my life and do something different."},
  ],
  HLL: [ // Rising Star — High Appeal, building Differentiation and Recognition
    {id:'f25',name:'Greta Thunberg',dates:'2003–present',domain:'Climate Activism',ba:89,bd:72,br:83,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Greta_Thunberg_au_parlement_europ%C3%A9en_%28Strasbourg%29_le_16_avril_2019_%2833744056508%29_%28cropped%29.jpg/440px-Greta_Thunberg_au_parlement_europ%C3%A9en_%28Strasbourg%29_le_16_avril_2019_%2833744056508%29_%28cropped%29.jpg',bio:"Greta's moral clarity and unapologetic directness created instant appeal — 'How dare you?' is one of the most memorable phrases of this century. Recognition grew rapidly. Differentiation (specific climate policy expertise) is still developing. A Rising Star in the truest sense.",quote:"I want you to act as if the house is on fire, because it is."},
    {id:'f26',name:'Emma Watson',dates:'1990–present',domain:'Acting & Activism',ba:90,bd:68,br:87,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Emma_Watson_2013.jpg/440px-Emma_Watson_2013.jpg',bio:"Hermione Granger gave Emma instant appeal and a head start on recognition. Her HeForShe UN speech showed genuine leadership ambition. But her differentiation — what does Emma Watson uniquely offer beyond 'inspirational actress-turned-activist'? — is still being defined.",quote:"If not me, who? If not now, when?"},
    {id:'f27',name:'Billie Eilish',dates:'2001–present',domain:'Music',ba:91,bd:78,br:88,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Billie_Eilish_at_the_2024_Academy_Awards_%28cropped%29.jpg/440px-Billie_Eilish_at_the_2024_Academy_Awards_%28cropped%29.jpg',bio:"Eilish arrived with extraordinary appeal — the oversized clothes, the whisper-pop aesthetic, mental health openness — and rapidly built recognition. Her differentiation is growing with each album. She is actively moving from Rising Star into Magnetic Expert territory.",quote:"I want to be a good person and I want people to know that I mean it."},
    {id:'f28',name:'Prince Harry',dates:'1984–present',domain:'Royalty & Advocacy',ba:84,bd:65,br:90,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Prince_Harry_October_2017.jpg/440px-Prince_Harry_October_2017.jpg',bio:"Harry's appeal — the relatable, rebellious royal — is genuine. Global recognition came with his birth. But his transition from royal to independent brand (Archewell, Netflix, podcasts) is still finding its unique value proposition. The differentiation chapter is being written now.",quote:"No one is born racist or a bigot. It is a learned behavior."},
    {id:'f29',name:'Alexandria Ocasio-Cortez',dates:'1989–present',domain:'Politics',ba:88,bd:74,br:83,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Alexandria_Ocasio-Cortez_2019.jpg/440px-Alexandria_Ocasio-Cortez_2019.jpg',bio:"AOC's appeal is genuine and magnetic — she speaks in plain language about inequality with rare moral conviction. Recognition grew explosively from 2018. Differentiation is building: the Green New Deal, her committee work, her social media mastery. She is the rising star of the left.",quote:"Fighting for economic, racial, and social justice is not radical — it's common sense."},
    {id:'f30',name:'Meghan Markle',dates:'1981–present',domain:'Royalty, Media & Advocacy',ba:85,bd:66,br:93,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Meghan_-_Harry_and_Meghan_tour_of_Australia_%28cropped%29.jpg/440px-Meghan_-_Harry_and_Meghan_tour_of_Australia_%28cropped%29.jpg',bio:"Meghan's personal appeal — poised, progressive, the first mixed-race member of the modern British Royal Family — generated global recognition almost immediately. Post-royal, her differentiation through Archewell Productions and The Tig relaunch is still being defined.",quote:"I never thought I'd say this, but I'm proud to be an American."},
    {id:'f31',name:'Justin Bieber',dates:'1994–present',domain:'Music',ba:83,bd:64,br:95,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Justin_Bieber_in_2015.jpg/440px-Justin_Bieber_in_2015.jpg',bio:"Bieber's early career was pure Rising Star: extraordinary appeal and rapidly building recognition, but differentiation limited to 'teen pop.' His post-Purpose evolution showed real artistic maturation — a Rising Star actively building expertise and depth.",quote:"I'm telling you, people. Everyday it gets a little easier. But you gotta do it every day."},
    {id:'f32',name:'Malala (at 16)',dates:'2007–present',domain:'Activism',ba:91,bd:72,br:79,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Malala_Yousafzai_at_Girl_Summit_2014.jpg/440px-Malala_Yousafzai_at_Girl_Summit_2014.jpg',bio:"At 16, immediately after surviving the Taliban shooting, Malala had sky-high appeal and rapidly growing recognition — but was still building the expertise and global platform that would earn her the Nobel Prize. She is the model Rising Star: appeal first, then expertise.",quote:"I raise up my voice — not so that I can shout, but so that those without a voice can be heard."},
  ],
  LHH: [ // Distinguished Authority — Low Appeal, High Differentiation + Recognition
    {id:'f33',name:'Bill Gates',dates:'1955–present',domain:'Technology & Philanthropy',ba:68,bd:95,br:97,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Bill_Gates_2017_%28cropped%29.jpg/440px-Bill_Gates_2017_%28cropped%29.jpg',bio:"Gates built Microsoft with legendary technical conviction — but was known as cold, ruthless in business, and socially awkward. Extraordinary differentiation (DOS, Windows, Office) and massive recognition. The warmth came later through the Gates Foundation. A classic Distinguished Authority.",quote:"It's fine to celebrate success but it is more important to heed the lessons of failure."},
    {id:'f34',name:'Angela Merkel',dates:'1954–present',domain:'Politics',ba:64,bd:92,br:96,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Angela_Merkel._Tallinn_Digital_Summit.jpg/440px-Angela_Merkel._Tallinn_Digital_Summit.jpg',bio:"Germany's Chancellor for 16 years was never charismatic — methodical, restrained, emotionally guarded. But her track record and intellectual competence were undeniable. She was universally respected without being universally loved. 'Mutti' commanded authority through results, not personality.",quote:"We can do this. Germany is a strong country."},
    {id:'f35',name:'Jeff Bezos',dates:'1964–present',domain:'Technology & Business',ba:60,bd:97,br:96,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Jeff_Bezos_at_Amazon_Spheres_Grand_Opening_in_Seattle_-_2018_%2840745173301%29_%28cropped%29.jpg/440px-Jeff_Bezos_at_Amazon_Spheres_Grand_Opening_in_Seattle_-_2018_%2840745173301%29_%28cropped%29.jpg',bio:"Bezos built the everything store and Blue Origin with laser focus and near-zero emotional warmth in public. His brand is 'Day 1' relentlessness and contrarian thinking. High differentiation — he reshaped retail, cloud computing, logistics. High recognition. Low personal appeal.",quote:"I knew that if I failed I wouldn't regret that, but I knew the one thing I might regret is not trying."},
    {id:'f36',name:'Warren Buffett',dates:'1930–present',domain:'Finance & Investing',ba:72,bd:96,br:96,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Warren_Buffett_KU_Visit.jpg/440px-Warren_Buffett_KU_Visit.jpg',bio:"The Oracle of Omaha's differentiation is absolute: the most successful investor in history. Recognition is total. His appeal is folksy — he eats McDonald's, drinks Coke, lives in the same house since 1958 — but it reads as contrived versus magnetic. Authority, not charisma, is his mode.",quote:"Someone is sitting in the shade today because someone planted a tree a long time ago."},
    {id:'f37',name:'Mark Zuckerberg',dates:'1984–present',domain:'Technology',ba:55,bd:94,br:97,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Mark_Zuckerberg_F8_2019_Keynote_%2832830578717%29_%28cropped%29.jpg/440px-Mark_Zuckerberg_F8_2019_Keynote_%2832830578717%29_%28cropped%29.jpg',bio:"Zuckerberg built the most used social network in history and then Meta — extraordinary differentiation. Universally recognized. But his robotic Senate testimony, 'and that's, um…' delivery and perceived emotional disconnection made him famous for low personal appeal. Classic Distinguished Authority.",quote:"Move fast and break things. Unless you are breaking stuff, you are not moving fast enough."},
    {id:'f38',name:'Alan Turing',dates:'1912–1954',domain:'Mathematics & Computing',ba:58,bd:99,br:88,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Alan_Turing_Aged_16.jpg/440px-Alan_Turing_Aged_16.jpg',bio:"Turing cracked the Enigma code and invented the theoretical foundations of computing — extraordinary differentiation. Recognition came (largely posthumously) for both his genius and his persecution as a gay man. His appeal was of the mind, not the personality: awkward, solitary, brilliant.",quote:"Sometimes it is the people no one can imagine anything of who do the things no one can imagine."},
    {id:'f39',name:'Charles Darwin',dates:'1809–1882',domain:'Science',ba:64,bd:99,br:95,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Charles_Darwin_by_Julia_Margaret_Cameron%2C_1868.jpg/440px-Charles_Darwin_by_Julia_Margaret_Cameron%2C_1868.jpg',bio:"Darwin spent 20 years after his Galápagos voyage quietly building evidence before publishing On the Origin of Species — a work of supreme differentiation. Recognized globally within his lifetime. His personal brand was methodical authority, not charisma. He let the idea speak.",quote:"It is not the strongest of the species that survives, but the most adaptable to change."},
    {id:'f40',name:'Stephen King',dates:'1947–present',domain:'Literature',ba:73,bd:94,br:93,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Stephen_King%2C_Comicon.jpg/440px-Stephen_King%2C_Comicon.jpg',bio:"King has written over 65 novels and defined an entire genre — his differentiation is absolute and prolific. Recognized globally. But his public persona is deliberately low-key: Maine recluse, baseball cap, ordinary guy. He lets his work create the magnetism rather than his personality.",quote:"The scariest moment is always just before you start."},
  ],
  LHL: [ // Hidden Gem — Low Appeal + Recognition, High Differentiation
    {id:'f41',name:'Nikola Tesla',dates:'1856–1943',domain:'Invention & Engineering',ba:62,bd:99,br:70,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/N.Tesla.JPG/440px-N.Tesla.JPG',bio:"During his lifetime, Tesla was the ultimate Hidden Gem: extraordinary technical differentiation (AC electricity, induction motor, radio) but poor personal appeal (eccentric, socially isolated) and recognition actively suppressed by Edison and Westinghouse. He died alone in a New York hotel.",quote:"The present is theirs; the future, for which I really worked, is mine."},
    {id:'f42',name:'Alan Turing (wartime)',dates:'1912–1945',domain:'Cryptography',ba:54,bd:99,br:58,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Alan_Turing_Aged_16.jpg/440px-Alan_Turing_Aged_16.jpg',bio:"During WWII, Turing's Bletchley Park work was classified — invisible to the world. Extraordinary expertise in a field that didn't exist yet. Low appeal as a person (shy, awkward, unable to 'sell himself'). Recognition came decades after his death. The definitive Hidden Gem.",quote:"We can only see a short distance ahead, but we can see plenty there that needs to be done."},
    {id:'f43',name:'Vincent van Gogh',dates:'1853–1890',domain:'Art',ba:60,bd:98,br:52,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project.jpg/440px-Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project.jpg',bio:"Van Gogh sold exactly one painting in his lifetime. He wrote thousands of letters to his brother Theo; almost no one responded to his art. Now universally recognized as a genius. High differentiation, low recognition and appeal in his lifetime. The Hidden Gem made canonical.",quote:"I dream my painting, and then I paint my dream."},
    {id:'f44',name:'Emily Dickinson',dates:'1830–1886',domain:'Poetry',ba:58,bd:97,br:54,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Black_white_photograph_of_Emily_Dickinson.jpg/440px-Black_white_photograph_of_Emily_Dickinson.jpg',bio:"Dickinson published fewer than 12 poems during her lifetime, living as a recluse. Her work — radical, compressed, slant-rhymed — was so differentiated that editors 'corrected' it to make it more conventional. Recognized only after death. The quintessential Hidden Gem.",quote:"I dwell in Possibility."},
    {id:'f45',name:'Gregor Mendel',dates:'1822–1884',domain:'Biology',ba:60,bd:98,br:48,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Gregor_Mendel_2.jpg/440px-Gregor_Mendel_2.jpg',bio:"Mendel discovered the laws of inheritance — the foundation of all genetics — in a monastery garden and published it in an obscure journal. Zero recognition in his lifetime. Darwin never knew his work. Rediscovered 16 years after his death. The most extreme Hidden Gem in science history.",quote:"My scientific studies have afforded me great gratification."},
    {id:'f46',name:'Franz Kafka',dates:'1883–1924',domain:'Literature',ba:62,bd:98,br:55,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Kafka1906_cropped.jpg/440px-Kafka1906_cropped.jpg',bio:"Kafka instructed his friend Max Brod to burn all his manuscripts after death. Brod refused. The Trial, The Metamorphosis, The Castle — all would have been lost. Kafka's differentiation was absolute and entirely unrecognized during his insurance-clerk life. A Hidden Gem saved by disobedience.",quote:"Don't bend; don't water it down; don't try to make it logical; don't edit your own soul."},
    {id:'f47',name:'Rosalind Franklin',dates:'1920–1958',domain:'Science',ba:66,bd:98,br:60,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Rosalind_Franklin_%281920-1958%29.jpg/440px-Rosalind_Franklin_%281920-1958%29.jpg',bio:"Franklin's Photo 51 — her X-ray image of DNA — was the data Watson and Crick used to win the Nobel Prize. She died without credit. Her differentiation in biophysics was extraordinary; her appeal was undermined by institutional sexism; her recognition was stolen. Hidden Gem made unjust.",quote:"Science and everyday life cannot and should not be separated."},
    {id:'f48',name:'Johann Sebastian Bach',dates:'1685–1750',domain:'Music',ba:64,bd:99,br:65,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Johann_Sebastian_Bach.jpg/440px-Johann_Sebastian_Bach.jpg',bio:"Bach was known in his lifetime as a court musician and church organist — competent, reliable, not special. His music was considered old-fashioned by his own sons. Forgotten for nearly a century. Then Mendelssohn revived the St Matthew Passion in 1829 and changed the world's opinion forever.",quote:"I worked hard. Anyone who works just as hard will get just as far."},
  ],
  LLH: [ // Recognized Professional — High Recognition, building Appeal and Differentiation
    {id:'f49',name:'Donald Trump',dates:'1946–present',domain:'Business & Politics',ba:58,bd:68,br:99,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Donald_Trump_official_portrait.jpg/440px-Donald_Trump_official_portrait.jpg',bio:"Trump's recognition is essentially total — the most searched name on Google for years. But his appeal is deeply polarised (half the world, high; half, near zero — averaging to moderate). Differentiation in real estate and entertainment predated politics. Brand = recognition first, content second.",quote:"Sometimes by losing a battle you find a new way to win the war."},
    {id:'f50',name:'Paris Hilton',dates:'1981–present',domain:'Media & Business',ba:72,bd:65,br:95,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Paris_Hilton_2014_%28cropped%29.jpg/440px-Paris_Hilton_2014_%28cropped%29.jpg',bio:"Hilton invented the influencer playbook before social media existed — famous for being famous. Massive recognition, built on personality not expertise. Recently she revealed genuine depth (DJ, entrepreneur, abuse survivor). She is actively building differentiation to match her recognition.",quote:"I'm not a dumb blonde. I'm just very good at pretending to be one."},
    {id:'f51',name:'Prince William',dates:'1982–present',domain:'Royalty & Advocacy',ba:68,bd:62,br:96,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Prince_William_2017.jpg/440px-Prince_William_2017.jpg',bio:"William is recognized everywhere as the future King of England. But his personal brand — compared to Charles' environmental advocacy or Diana's emotional accessibility — lacks a defining differentiation. He is building it now with Earthshot. Recognition came with birth; brand equity must be earned.",quote:"When people are in a difficult, dark place, it is our duty to reach in and help them out."},
    {id:'f52',name:'Boris Johnson',dates:'1964–present',domain:'Politics',ba:64,bd:65,br:94,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Boris_Johnson_official_portrait_%28cropped%29.jpg/440px-Boris_Johnson_official_portrait_%28cropped%29.jpg',bio:"Johnson's recognition is near-universal — the hair, the 'Get Brexit Done' phrase, the bus with the NHS claim. But appeal is polarised and differentiation is thin (classical quotations aside). He is famous largely for the act of being Boris. Recognition without substance is the Recognized Professional trap.",quote:"My policy on cake is pro having it and pro eating it."},
    {id:'f53',name:'Queen Elizabeth II',dates:'1926–2022',domain:'Royalty',ba:70,bd:68,br:99,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Queen_Elizabeth_II_official_portrait_for_1959_tour_%28retouched%29_%28cropped%29.jpg/440px-Queen_Elizabeth_II_official_portrait_for_1959_tour_%28retouched%29_%28cropped%29.jpg',bio:"The Queen was recognized by virtually every human on earth — 70 years on the throne, the same face on every Commonwealth coin. Her appeal was dignified rather than warm. Her differentiation was her role, not a skill. Recognition through institution rather than earned brand equity.",quote:"It has always been easy to hate and destroy. To build and to cherish is much more difficult."},
    {id:'f54',name:'Justin Timberlake',dates:'1981–present',domain:'Music & Entertainment',ba:74,bd:67,br:93,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Justin_Timberlake_2018_%28cropped%29.jpg/440px-Justin_Timberlake_2018_%28cropped%29.jpg',bio:"Timberlake is recognized globally as a pop star, actor, producer. But the gut-level question 'what does JT uniquely stand for?' is harder than for peers like Jay-Z or Eminem. He is talented at many things without owning one. His personal brand recognition outpaces his differentiation.",quote:"The best thing I can do is be myself."},
    {id:'f55',name:'Britney Spears',dates:'1981–present',domain:'Music',ba:73,bd:64,br:95,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Britney_Spears_2013_%28cropped%29.jpg/440px-Britney_Spears_2013_%28cropped%29.jpg',bio:"Britney is globally recognized — she defined late-1990s pop and her 'Free Britney' story generated worldwide solidarity. But her differentiation beyond 'pop princess' was always limited: she was a performer within a system, not an artist who created a new category. Recognition far exceeds brand depth.",quote:"I'm not here for your entertainment."},
    {id:'f56',name:'Kim Jong-un',dates:'1983 (est.)–present',domain:'Politics',ba:35,bd:66,br:97,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Kim_Jong-un_April_2019_%28cropped%29.jpg/440px-Kim_Jong-un_April_2019_%28cropped%29.jpg',bio:"Kim is recognized by essentially every human on earth — nuclear ambitions, rare public appearances, and diplomatic brinkmanship ensure global attention. Appeal is low outside North Korea. Differentiation is political power, not a skill or expertise that transfers. Recognition through spectacle, not brand equity.",quote:"We must crush hostile forces with a single blow."},
  ],
  LLL: [ // Emerging Brand — All three dimensions being built from scratch
    {id:'f57',name:'Young Oprah',dates:'1970s',domain:'Broadcasting (early career)',ba:65,bd:52,br:45,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Oprah_winfrey_2011_crop.jpg/440px-Oprah_winfrey_2011_crop.jpg',bio:"Before The Oprah Winfrey Show, Oprah was a local TV co-anchor in Baltimore being told she was 'too emotional' for news. Her appeal was always there, but differentiation and recognition were near zero. She was fired from her first TV job. The Brand Champion emerged from an Emerging Brand.",quote:"The biggest adventure you can take is to live the life of your dreams."},
    {id:'f58',name:'Young Steve Jobs',dates:'1970s',domain:'Technology (early career)',ba:62,bd:55,br:40,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Steve_Jobs_Headshot_2010-CROP_%28cropped_2%29.jpg/440px-Steve_Jobs_Headshot_2010-CROP_%28cropped_2%29.jpg',bio:"Before Apple, Jobs was a college dropout who slept on floors, returned Coke bottles for food, and obsessed over typefaces at Reed College. High potential appeal; near-zero recognition and differentiation. The iconic Brand Champion started exactly here — at zero.",quote:"I'm convinced that about half of what separates successful entrepreneurs from the non-successful ones is pure perseverance."},
    {id:'f59',name:'Young Barack Obama',dates:'1980s',domain:'Community Organizing',ba:68,bd:52,br:42,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/President_Barack_Obama.jpg/440px-President_Barack_Obama.jpg',bio:"Before Harvard Law and the Senate, Obama was a community organizer on Chicago's South Side — unknown, underfunded, working block by block. His appeal was always extraordinary; recognition and differentiation near zero. Every Brand Champion begins as an Emerging Brand.",quote:"The best way to not feel hopeless is to get up and do something."},
    {id:'f60',name:'Young Elon Musk',dates:'1990s',domain:'Technology (early career)',ba:60,bd:55,br:38,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Elon_Musk_Royal_Society_%28crop2%29.jpg/440px-Elon_Musk_Royal_Society_%28crop2%29.jpg',bio:"Before Tesla and SpaceX, Musk was an immigrant in Canada with $2,000 and a suitcase, sleeping on a couch, eating hot dogs and oranges. His Zip2 startup was modest; PayPal was sold. Recognition and differentiation: minimal. The journey from LLL to HHH is possible.",quote:"Failure is an option here. If things are not failing, you are not innovating enough."},
    {id:'f61',name:'Young Taylor Swift',dates:'2006',domain:'Country Music (debut)',ba:72,bd:54,br:48,photo:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/191125_Taylor_Swift_at_the_2019_American_Music_Awards_%28cropped%29.jpg/440px-191125_Taylor_Swift_at_the_2019_American_Music_Awards_%28cropped%29.jpg',bio:"At debut, Taylor was a 16-year-old on a small Nashville label — warm, appealing, but not yet differentiated or broadly recognised. The self-titled album sold 39,000 copies in week one. A genuine Emerging Brand who systematically built every dimension over the next 20 years.",quote:"No matter what happens in life, be good to people. Being good to people is a wonderful legacy to leave behind."},

// ── USER AUTH HELPERS ─────────────────────────────────────────────────────────
function getUsers(){return JSON.parse(localStorage.getItem('pbe_users')||'[]');}
function saveUsers(u){localStorage.setItem('pbe_users',JSON.stringify(u));}
function getUserResults(email){return JSON.parse(localStorage.getItem(`pbe_ur_${email}`)||'[]');}
function saveUserResult(email,result){
  const prev=getUserResults(email);
  prev.push({...result,savedAt:new Date().toISOString()});
  if(prev.length>50) prev.shift();
  localStorage.setItem(`pbe_ur_${email}`,JSON.stringify(prev));
}
function getPeerResultsForUser(email){return JSON.parse(localStorage.getItem(`pbe_peer_${email}`)||'[]');}
function savePeerResultForUser(email,result){
  const prev=getPeerResultsForUser(email);
  prev.push({...result,savedAt:new Date().toISOString()});
  localStorage.setItem(`pbe_peer_${email}`,JSON.stringify(prev));
}

// ── ORG-MODE UTILITIES ────────────────────────────────────────────────────────
const genCode=()=>Math.random().toString(36).substr(2,8).toUpperCase();
const getOrgs=()=>JSON.parse(localStorage.getItem('pbe_orgs')||'[]');
const saveOrgs=orgs=>localStorage.setItem('pbe_orgs',JSON.stringify(orgs));
const getOrgById=id=>getOrgs().find(o=>o.id===id)||null;
const findOrgByCode=code=>getOrgs().find(o=>o.joinCode===code.toUpperCase().trim())||null;
const getOrgMembers=orgId=>{
  const all=JSON.parse(localStorage.getItem('pbe_org_members')||'{}');
  return all[orgId]||[];
};
const saveOrgMember=(orgId,member)=>{
  const all=JSON.parse(localStorage.getItem('pbe_org_members')||'{}');
  const members=all[orgId]||[];
  const idx=members.findIndex(m=>m.email===member.email);
  if(idx>=0)members[idx]={...members[idx],...member};
  else members.push(member);
  all[orgId]=members;
  localStorage.setItem('pbe_org_members',JSON.stringify(all));
};
const getPeerAssignments=orgId=>JSON.parse(localStorage.getItem(`pbe_peer_asgn_${orgId}`)||'[]');
const savePeerAssignments=(orgId,asgns)=>localStorage.setItem(`pbe_peer_asgn_${orgId}`,JSON.stringify(asgns));

// ── ORG CREATE SCREEN ─────────────────────────────────────────────────────────
function OrgCreateScreen({onCreated,onBack}) {
  const [step,setStep]=useState(1);

  const [industry,setIndustry]=useState('');
  const [yourName,setYourName]=useState('');

  const [yourRole,setYourRole]=useState('');

    if(!orgName.trim()){setErr('Please enter an organization name');return;}

      joinCode:genCode(),created:new Date().toLocaleDateString(),memberCount:1

      role:yourRole.trim()||'Administrator',isAdmin:true,
      joined:new Date().toLocaleDateString(),hasAssessment:false

            const active=step===i+1,done=step>i+1;
            return(<React.Fragment key={s}>

            <p className="small" style={{marginBottom:24}}>Set up a shared space for your team to complete and compare brand assessments.</p>
            <div style={{marginBottom:16}}>
              <label className="label" style={{display:'block',marginBottom:5}}>Organization Name *</label>
              <input className="inp" placeholder="e.g. Acme Corp, Marketing Team, PhD Cohort…"
                value={orgName} onChange={e=>{setOrgName(e.target.value);setErr('');}}
                onKeyDown={e=>e.key==='Enter'&&setStep(2)} autoFocus/>
            </div>
            <div style={{marginBottom:20}}>
              <label className="label" style={{display:'block',marginBottom:5}}>Industry</label>
              <select className="inp" value={industry} onChange={e=>setIndustry(e.target.value)}>
                <option value="">Select industry…</option>
                {industries.map(i=><option key={i} value={i}>{i}</option>)}

// ── ORG JOIN SCREEN ───────────────────────────────────────────────────────────
function OrgJoinScreen({onJoined,onBack}) {
  const [code,setCode]=useState('');
  const [step,setStep]=useState(1);
  const [org,setOrg]=useState(null);
  const [yourName,setYourName]=useState('');
  const [yourEmail,setYourEmail]=useState('');
  const [yourRole,setYourRole]=useState('');
  const [err,setErr]=useState('');

  const findOrg=()=>{
    if(!code.trim()){setErr('Please enter a join code');return;}
    const found=findOrgByCode(code);
    if(!found){setErr('No organization found with that code. Check the code and try again.');return;}
    setOrg(found);setErr('');setStep(2);
  };

  const handleJoin=()=>{
    if(!yourName.trim()||!yourEmail.trim()){setErr('Please enter your name and email');return;}
    if(!/\S+@\S+\.\S+/.test(yourEmail)){setErr('Please enter a valid email');return;}
    const member={name:yourName.trim(),email:yourEmail.trim().toLowerCase(),
      role:yourRole.trim()||'Member',isAdmin:false,
      joined:new Date().toLocaleDateString(),hasAssessment:false};
    saveOrgMember(org.id,member);

                onKeyDown={e=>e.key==='Enter'&&findOrg()} autoFocus/>
            </div>
            {err&&<div className="toast toast--error" style={{marginBottom:12}}>{err}</div>}
            <button className="btn btn-p" style={{width:'100%'}} onClick={findOrg}>Find Organization →</button>
          </div>
        )}
        {step===2&&org&&(
          <div className="card-xl fu">
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,
              padding:'14px 16px',background:'var(--bd-l)',borderRadius:12,border:'1px solid var(--bd-d)30'}}>
              <span style={{fontSize:24}}>✅</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:'var(--bd-text)'}}>Organization found!</div>
                <div style={{fontSize:13,color:'var(--text2)'}}>Joining: <strong>{org.name}</strong> · {org.industry}</div>
              </div>
            </div>
            <h3 className="subtitle" style={{marginBottom:16}}>Your Details</h3>
            <div style={{marginBottom:14}}>
              <label className="label" style={{display:'block',marginBottom:5}}>Full Name *</label>
              <input className="inp" placeholder="Your name" value={yourName}
                onChange={e=>{setYourName(e.target.value);setErr('');}} autoFocus/>
            </div>
            <div style={{marginBottom:14}}>
              <label className="label" style={{display:'block',marginBottom:5}}>Email Address *</label>
              <input className="inp" type="email" placeholder="you@company.com" value={yourEmail}

            <div style={{marginBottom:20}}>
              <label className="label" style={{display:'block',marginBottom:5}}>Your Role / Title</label>

// ── ORG DASHBOARD ─────────────────────────────────────────────────────────────
function OrgDashboard({org,currentMember,onTakeAssessment,onClose}) {
  const [members,setMembers]=useState(()=>getOrgMembers(org.id));
  const [assignments,setAssignments]=useState(()=>getPeerAssignments(org.id));
  const [tab,setTab]=useState('overview'); // 'overview' | 'members' | 'peers' | 'settings'
  const [showAssignModal,setShowAssignModal]=useState(false);
  const [assignRater,setAssignRater]=useState('');
  const [assignTarget,setAssignTarget]=useState('');
  const [copiedCode,setCopiedCode]=useState(false);
  const isAdmin=currentMember?.isAdmin;

  const refresh=()=>{
    setMembers(getOrgMembers(org.id));
    setAssignments(getPeerAssignments(org.id));
  };

  const assessed=members.filter(m=>m.hasAssessment);
  const notAssessed=members.filter(m=>!m.hasAssessment);
  const avgBA=assessed.length?assessed.reduce((s,m)=>s+(m.BA||0),0)/assessed.length:0;
  const avgBD=assessed.length?assessed.reduce((s,m)=>s+(m.BD||0),0)/assessed.length:0;
  const avgBR=assessed.length?assessed.reduce((s,m)=>s+(m.BR||0),0)/assessed.length:0;
  const avgPBE=assessed.length?assessed.reduce((s,m)=>s+(m.PBEw||0),0)/assessed.length:0;

  const archetypeCounts={};
  assessed.forEach(m=>{if(m.archetypeKey)archetypeCounts[m.archetypeKey]=(archetypeCounts[m.archetypeKey]||0)+1;});

  const addAssignment=()=>{
    if(!assignRater||!assignTarget||assignRater===assignTarget) return;
    const raterMember=members.find(m=>m.email===assignRater);
    const targetMember=members.find(m=>m.email===assignTarget);
    if(!raterMember||!targetMember) return;
    const asgn={raterId:assignRater,raterName:raterMember.name,
      targetId:assignTarget,targetName:targetMember.name,
      completed:false,created:new Date().toLocaleDateString()};
    const updated=[...assignments];
    const exists=updated.find(a=>a.raterId===assignRater&&a.targetId===assignTarget);
    if(!exists){updated.push(asgn);savePeerAssignments(org.id,updated);setAssignments(updated);}
    setAssignRater('');setAssignTarget('');setShowAssignModal(false);
  };

  const removeAssignment=(i)=>{
    const updated=assignments.filter((_,j)=>j!==i);
    savePeerAssignments(org.id,updated);setAssignments(updated);
  };

  const myAssignments=assignments.filter(a=>a.raterId===currentMember?.email&&!a.completed);
  const peerLinkBase=window.location.href.split('?')[0];

  const TABS=[{k:'overview',l:'Overview'},{k:'members',l:`Members (${members.length})`},
    {k:'peers',l:`Peer Ratings (${assignments.length})`},{k:'settings',l:'Settings'}];

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:60}}>
      {/* Header */}
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',
        padding:'16px 20px',boxShadow:'var(--sh)'}}>
        <div style={{maxWidth:900,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                <div className="chip" style={{background:'#8B5CF618',color:'#8B5CF6'}}>
                  {isAdmin?'Admin':'Member'}
                </div>
                {org.industry&&<div className="chip chip--neutral">{org.industry}</div>}
              </div>
              <h1 style={{fontFamily:'var(--fd)',fontSize:22,fontWeight:800,letterSpacing:'-.015em'}}>
                {org.name}
              </h1>
              <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
                {members.length} members · {assessed.length} assessments completed
              </div>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {myAssignments.length>0&&(
                <button className="btn btn-s" style={{fontSize:13,
                  background:'var(--bi-l)',borderColor:'var(--bi-d)30',color:'var(--bi-text)'}}
                  onClick={()=>setTab('peers')}>
                  ⚡ {myAssignments.length} Pending Rating{myAssignments.length>1?'s':''}
                </button>
              )}
              {!currentMember?.hasAssessment&&(
                <button className="btn btn-p" onClick={onTakeAssessment}>
                  Take Assessment →
                </button>
              )}
              <button className="btn btn-s" style={{fontSize:13}} onClick={onClose}>← Exit Org</button>
            </div>
          </div>
          {/* Tab nav */}
          <div style={{display:'flex',gap:0,marginTop:12,borderBottom:'2px solid var(--border)',marginBottom:-2}}>
            {TABS.map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)}
                style={{padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',border:'none',
                  background:'none',fontFamily:'var(--fb)',transition:'all .15s',
                  color:tab===t.k?'var(--text)':'var(--text3)',
                  borderBottom:`2px solid ${tab===t.k?'var(--text)':'transparent'}`,
                  marginBottom:-2}}>
                {t.l}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:'0 auto',padding:'24px 20px'}}>
        {/* ── OVERVIEW TAB */}
        {tab==='overview'&&(
          <>
          {/* If user hasn't taken assessment, nudge them */}
          {!currentMember?.hasAssessment&&(
            <div style={{background:'linear-gradient(135deg,#8B5CF615,#8B5CF608)',
              border:'1.5px solid #8B5CF630',borderRadius:16,padding:'20px 24px',marginBottom:24,
              display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
              <div style={{fontSize:36}}>📊</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>Complete your self-assessment</div>
                <div style={{fontSize:13,color:'var(--text2)'}}>
                  Your colleagues are waiting for your brand profile. It takes ~8 minutes.
                </div>
              </div>
              <button className="btn btn-p" onClick={onTakeAssessment}>Start Assessment →</button>
            </div>
          )}

          {/* Stat cards */}
          <div className="g4" style={{marginBottom:24}}>
            {[
              {label:'Team Avg PBE',v:assessed.length?`${Math.round(avgPBE)}`:'-',c:'#8B5CF6',note:'Overall score'},
              {label:'Brand Appeal',v:assessed.length?`${Math.round(avgBA)}`:'-',c:DC.BA,note:'Team average'},
              {label:'Differentiation',v:assessed.length?`${Math.round(avgBD)}`:'-',c:DC.BD,note:'Team average'},
              {label:'Recognition',v:assessed.length?`${Math.round(avgBR)}`:'-',c:DC.BR,note:'Team average'},
            ].map(s=>(
              <div key={s.label} className="card card-p" style={{textAlign:'center'}}>

// ── USER AUTH SCREEN ──────────────────────────────────────────────────────────
function UserAuthScreen({onLogin,onClose,initialMode}) {
  const [mode,setMode]=useState(initialMode==='register'?'register':'login'); // 'login' | 'register' | 'forgot'
  const [email,setEmail]=useState('');
  const [name,setName]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [loading,setLoading]=useState(false);

  const doLogin=async()=>{
    if(!email||!pw){setErr('Please enter your email and password.');return;}
    setLoading(true);setErr('');
    // Try Supabase first
    if(_supa){
      const {data,error}=await authSignIn(email,pw);
      setLoading(false);
      if(error){setErr(error.message.replace('Invalid login credentials','Incorrect email or password.'));return;}
      const u={email:data.user.email,name:data.user.user_metadata?.name||data.user.email.split('@')[0],
        id:data.user.id,supabase:true};
      onLogin(u);
    } else {
      // Fallback: localStorage (dev/offline mode)
      const users=getUsers();
      const u=users.find(x=>x.email.toLowerCase()===email.toLowerCase());
      setLoading(false);
      if(!u){setErr('No account found with this email.');return;}
      if(u.pw!==btoa(pw)){setErr('Incorrect password.');return;}
      onLogin(u);
    }
  };

  const doRegister=async()=>{
    if(!email.includes('@')){setErr('Enter a valid email address.');return;}
    if(pw.length<6){setErr('Password must be at least 6 characters.');return;}
    if(pw!==pw2){setErr('Passwords do not match.');return;}
    setLoading(true);setErr('');
    if(_supa){
      const {data,error}=await authSignUp(email,pw,name||email.split('@')[0]);
      setLoading(false);
      if(error){setErr(error.message);return;}
      if(data?.user?.identities?.length===0){setErr('An account with this email already exists.');return;}
      const u={email,name:name||email.split('@')[0],id:data.user?.id,supabase:true};
      setOk('Account created! Welcome to PBES.');
      setTimeout(()=>onLogin(u),1000);
    } else {
      const users=getUsers();
      if(users.find(x=>x.email.toLowerCase()===email.toLowerCase())){
        setLoading(false);setErr('An account with this email already exists.');return;
      }
      const user={email,name:name||email.split('@')[0],pw:btoa(pw),created:new Date().toISOString()};
      users.push(user);saveUsers(users);
      setLoading(false);
      setOk('Account created! You are now signed in.');
      setTimeout(()=>onLogin(user),1000);
    }
  };

  const doForgotPassword=async()=>{
    if(!email.includes('@')){setErr('Enter your email address above first.');return;}
    setLoading(true);setErr('');
    const {error}=await authResetPassword(email);
    setLoading(false);
    if(error){setErr(error.message);return;}
    setOk(`Password reset link sent to ${email}. Check your inbox.`);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:200,
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}
      onClick={onClose}>
      <div className="card-xl" style={{maxWidth:420,width:'100%',animation:'scaleIn .3s ease'}}
        onClick={e=>e.stopPropagation()}>
        {mode!=='forgot'&&(
          <div style={{display:'flex',gap:4,marginBottom:20,background:'var(--bg)',
            borderRadius:12,padding:4}}>
            {['login','register'].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr('');setOk('');}}
                style={{flex:1,padding:'8px',borderRadius:9,border:'none',cursor:'pointer',
                  fontFamily:'var(--fb)',fontSize:14,fontWeight:600,transition:'all .15s',
                  background:mode===m?'var(--surface)':'transparent',
                  color:mode===m?'var(--text)':'var(--text3)',
                  boxShadow:mode===m?'0 1px 4px rgba(0,0,0,.08)':'none'}}>
                {m==='login'?'Sign In':'Create Account'}
              </button>
            ))}
          </div>
        )}

        <h2 className="title" style={{marginBottom:4}}>
          {mode==='login'?'Welcome back':mode==='forgot'?'Reset your password':'Create your account'}
        </h2>
        <p className="small" style={{marginBottom:20}}>
          {mode==='login'
            ?'Sign in to view your past results and peer ratings.'
            :mode==='forgot'
            ?'Enter your email and we\'ll send you a password reset link.'
            :'Register to save your results and receive peer ratings from colleagues.'}
        </p>

        {mode==='register'&&(
          <div style={{marginBottom:12}}>
            <label htmlFor="auth-name" className="label" style={{marginBottom:5,display:'block'}}>Full Name</label>
            <input id="auth-name" className="inp" placeholder="Péter Szántó" required maxLength={100}
              value={name} onChange={e=>setName(e.target.value)}/>
          </div>
        )}
        <div style={{marginBottom:12}}>
          <label htmlFor="auth-email" className="label" style={{marginBottom:5,display:'block'}}>Email Address</label>
          <input id="auth-email" className="inp" type="email" placeholder="you@example.com" required maxLength={150} autoComplete="email"
            value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        {mode!=='forgot'&&(
          <div style={{marginBottom:mode==='register'?12:20}}>
            <label htmlFor="auth-pw" className="label" style={{marginBottom:5,display:'block'}}>Password</label>
            <input id="auth-pw" className="inp" type="password" placeholder={mode==='register'?'At least 6 characters':'Your password'}
              required maxLength={128} autoComplete={mode==='register'?'new-password':'current-password'}
              value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&(mode==='login'?doLogin():null)}/>
          </div>
        )}
        {mode==='register'&&(
          <div style={{marginBottom:20}}>
            <label htmlFor="auth-pw2" className="label" style={{marginBottom:5,display:'block'}}>Confirm Password</label>
            <input id="auth-pw2" className="inp" type="password" placeholder="Re-enter password"
              required maxLength={128} autoComplete="new-password"
              value={pw2} onChange={e=>setPw2(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doRegister()}/>
          </div>
        )}

        {err&&<div className="toast toast--error" style={{marginBottom:10}}>{err}</div>}
        {ok&&<div className="toast toast--success" style={{marginBottom:10}}>{ok}</div>}

        {mode==='forgot'?(
          <>
            <button className="btn btn-p" style={{width:'100%',marginBottom:10,opacity:loading?.6:1}}
              onClick={doForgotPassword} disabled={loading}>
              {loading?'Sending…':'Send Reset Link →'}
            </button>
            <button className="btn btn-s" style={{width:'100%',marginBottom:8}}
              onClick={()=>{setMode('login');setErr('');setOk('');}}>← Back to Sign In</button>
          </>
        ):(
          <>
            <button className="btn btn-p" style={{width:'100%',marginBottom:10,opacity:loading?.6:1}}
              onClick={mode==='login'?doLogin:doRegister} disabled={loading}>
              {loading?'Please wait…':mode==='login'?'Sign In →':'Create Account →'}
            </button>
            {mode==='login'&&(
              <button className="btn btn-s" style={{width:'100%',marginBottom:8}}
                onClick={()=>{setMode('forgot');setErr('');setOk('');}}>
                Forgot password?
              </button>
            )}
            <button className="btn btn-s" style={{width:'100%'}} onClick={onClose}>Cancel</button>
          </>
        )}
        <div style={{marginTop:12,fontSize:11,color:'var(--text3)',textAlign:'center',lineHeight:1.6}}>
          {_supa?'Your data is securely stored in the cloud with end-to-end encryption.':'Your data is stored locally in your browser. Deploy with Supabase for cloud sync.'}
        </div>
      </div>
    </div>
  );
}

function UserDashboard({user,onSignOut,onClose,onRetake}) {
  const myResults=getUserResults(user.email);
  const peerResults=getPeerResultsForUser(user.email);
  const [tab,setTab]=useState('my');

  // Analytics helpers
  const latest=myResults.length?myResults[myResults.length-1]:null;
  const earliest=myResults.length>1?myResults[0]:null;
  const avgPeer=peerResults.length?{
    BA:peerResults.reduce((s,r)=>s+(r.BA||0),0)/peerResults.length,
    BD:peerResults.reduce((s,r)=>s+(r.BD||0),0)/peerResults.length,
    BR:peerResults.reduce((s,r)=>s+(r.BR||0),0)/peerResults.length,
    PBEw:peerResults.reduce((s,r)=>s+(r.PBEw||0),0)/peerResults.length,

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:200,

      overflowY:'auto'}} onClick={onClose}>
